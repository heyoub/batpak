# Repository-local Cargo config must stay portable.
# Target-specific canonical container settings (for example Linux mold linking)
# belong here. Host-specific linker or environment overrides still belong in:
#   - ~/.cargo/config.toml
# Cargo does not load a repository-local ".cargo/config.local.toml" automatically.

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=/usr/bin/ld.mold"]

[alias]
xtask = "run --quiet --package xtask --"
