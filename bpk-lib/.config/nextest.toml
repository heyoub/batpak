[store]
# Keep Nextest's own run metadata beside the Cargo workspace artifacts.
dir = "target/nextest"

[profile.default]
retries = 0
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = true

[profile.ci]
# GAUNT-FLAKE-7: retries=0. A masked flake is a hidden bug; CI must surface
# nondeterminism instead of papering over it with reruns. Genuinely
# nondeterministic tests are to be quarantined explicitly via a per-test
# `[[profile.ci.overrides]]` retries override with a tracking issue — never a
# blanket retry. `fail-fast = false` is kept for full per-run signal.
retries = 0
fail-fast = false
test-threads = "num-cpus"
slow-timeout = { period = "60s", terminate-after = 3 }

[test-groups]
windows-heavy-properties = { max-threads = 1 }

# Property tests that open multiple stores with different view configs
# can exceed 60s on Windows CI due to NTFS per-file-operation latency.
[[profile.ci.overrides]]
filter = "test(all_view_topologies) | test(reopened_view_topologies) | test(reopen_paths_match)"
platform = 'cfg(windows)'
test-group = "windows-heavy-properties"
slow-timeout = { period = "300s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = "test(all_view_topologies) | test(reopened_view_topologies) | test(reopen_paths_match)"
slow-timeout = { period = "120s", terminate-after = 2 }

# Compile-fail, downstream-fixture, and the subprocess registry/collision fixtures
# intentionally invoke nested Cargo builds (they `cargo build --release` a fixture
# crate and run it). Cold / saturated CI hosts — notably the mutation runner, which
# is CPU-bound — can blow past the 60s default on the first cold fixture compile
# while still making progress, so keep the extra budget local to those compile-heavy
# surfaces. (`event_payload_registry_startup` + `event_payload_collision_default_fail_fast`
# are the subprocess-fixture drivers; timing out there is a build-speed artifact, not
# a real failure.)
[[profile.ci.overrides]]
filter = "test(compile_fail) | test(downstream_fixture) | test(release_binary_) | test(startup_registry_check_feature_aborts) | test(refuses_open_on_kind_collision) | test(warn_opt_in_still_opens_on_kind_collision)"
slow-timeout = { period = "300s", terminate-after = 2 }

[profile.default.junit]
path = "junit.xml"

# cargo-mutants runs every per-mutant test invocation under this profile
# (NEXTEST_PROFILE=mutants, pinned by the mutants runner). `fail-fast = true` is
# LOAD-BEARING for mutation: a mutant is convicted the instant ANY test fails, so
# a fast-failing assertion short-circuits the run BEFORE a sibling test that the
# mutation livelocked can hang it. Under `fail-fast = false` a single hung test
# grinds the whole suite to cargo-mutants' outer timeout and the mutant reads as a
# TIMEOUT survivor even though a fast assertion already caught it — cargo-mutants'
# own docs recommend keeping fail-fast on for mutation. `terminate-after` is the
# backstop for a pure-hang mutant that no assertion catches: the hung test is
# reaped as a per-test timeout-failure instead of hanging the run.
[profile.mutants]
retries = 0
fail-fast = true
slow-timeout = { period = "30s", terminate-after = 2 }

# Mirror the ci profile's generous budgets for the known-slow surfaces so the
# unmutated baseline (which runs every test, fail-fast never triggering) cannot
# trip terminate-after.
[[profile.mutants.overrides]]
filter = "test(all_view_topologies) | test(reopened_view_topologies) | test(reopen_paths_match)"
slow-timeout = { period = "120s", terminate-after = 2 }

[[profile.mutants.overrides]]
filter = "test(compile_fail) | test(downstream_fixture) | test(release_binary_) | test(startup_registry_check_feature_aborts) | test(refuses_open_on_kind_collision) | test(warn_opt_in_still_opens_on_kind_collision)"
slow-timeout = { period = "300s", terminate-after = 2 }
