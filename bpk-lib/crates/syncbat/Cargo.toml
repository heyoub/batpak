[package]
name = "syncbat"
version = "0.7.6"
edition = "2021"
rust-version = "1.92"
license = "MIT OR Apache-2.0"
description = "Sync-first runtime layer for batpak-family operation kits."
repository = "https://github.com/heyoub/batpak"
homepage = "https://github.com/heyoub/batpak"
documentation = "https://docs.rs/syncbat"
readme = "README.md"

[features]
default = []

[dependencies]
batpak = { path = "../core", version = "0.7.6", default-features = false }
serde = { version = "1", features = ["derive"] }
syncbat-macros = { path = "../syncbat-macros", version = "0.7.6" }

[dev-dependencies]
tempfile = ">=3.24, <3.28"
trybuild = "1"

[lints]
workspace = true
