[package]
name = "syncbat"
version = "0.1.0"
edition = "2021"
rust-version = "1.92"
license = "MIT OR Apache-2.0"
description = "Sync-first runtime layer for batpak-family operation kits."
repository = "https://github.com/heyoub/batpak"
homepage = "https://github.com/heyoub/batpak"
documentation = "https://docs.rs/syncbat"
publish = false

[features]
default = []

[dependencies]
batpak = { path = "../core", version = "0.7.5", default-features = false }
serde = { version = "1", features = ["derive"] }
syncbat-macros = { path = "../syncbat-macros", version = "0.1.0" }

[dev-dependencies]
tempfile = ">=3.24, <3.25"
trybuild = "1"
