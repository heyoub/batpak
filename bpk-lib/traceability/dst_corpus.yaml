# dst_corpus.yaml — graduated DST recovery corpus (Thread #64-B).
#
# Durable ledger of seeded crash-recovery runs over the real Store+SimFs
# composition. Each entry passed graduation: a deterministic digest across two
# runs, a legality-oracle pass, and a declared target seam. The corpus is a
# growing oracle that now covers the FULL hostile-fs fault matrix the recovery
# oracle models, not just one honest-disk path:
#
#   * HonestDiskCrash    — fsync honored; a crash loses only the unsynced tail.
#                          Routes through `store::sim::recovery::run`.
#   * LyingDiskFsyncDrop — ~1-in-`fsync_drop_one_in` fsync silently dropped, so an
#                          "acked" commit may be legally absent after the crash.
#   * CrashBeforeFsync   — mid-write abort at a durability `boundary`, leaving a
#                          torn/partial frame; recovery must be a clean prefix or
#                          a typed refusal, never a half-ghost.
# The non-honest modes route through `store::sim::recovery_matrix::run`.
#
# Replay one seed with
# `BATPAK_SEED=<seed> cargo nextest run -p batpak --features dangerous-test-hooks
# -E 'test(dst_corpus_currency)'`.
#
# Schema — one entry per graduated seed:
#   seed:                u64   — SimFs / op-plan seed (decimal)
#   oracle:              str   — StoreRecovery | ForkIsolation | ImportReapply
#   fault_mode:          str   — HonestDiskCrash | LyingDiskFsyncDrop | CrashBeforeFsync
#   boundary:            str?  — durability boundary (CrashBeforeFsync only); null otherwise:
#                                SingleAppendFrame | BatchCommitMarker |
#                                BatchPostFsyncPrePublish | SegmentRotationCreate
#                                ImportReapply-only: SameStoreCeiling selects the no-runaway replay
#   fsync_drop_one_in:   u32?  — 1-in-N fsync-drop rate (LyingDiskFsyncDrop only); null otherwise
#   seam_touched:        str   — critical mutation seam slug this seed stresses
#   assurance_level:     str   — AL at graduation (L3/L4)
#   steps:               u32   — op-plan length for the recovery oracle
#   op_trace_digest:     u64   — FNV-1a identity; must replay identically
#   outcome:             str   — CommittedPrefix | RolledBack | CanonicalRefusal

