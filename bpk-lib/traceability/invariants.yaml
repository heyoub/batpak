- id: INV-NO-TOKIO-PROD
  statement: Production dependencies remain runtime-agnostic; Tokio stays out of non-dev dependencies.
  artifacts:
    - ART-CARGO
    - ART-BUILD-RS
- id: INV-EVENT-PAYLOAD-DECODE-BACKCOMPAT
  statement: The single typed-decode seam keeps decoding historical payload bytes as schemas evolve - additive-with-default is absorbed by serde, an older stored payload_version is lifted to the current shape by the registered Upcast chain (in-memory only, stored bytes never rewritten), and a stored version newer than the decoder is a hard FutureVersion error; adding the payload_version header field moves no event content hash or signature.
  artifacts:
    - ART-EVENT-PAYLOAD-DECODE-SEAM
    - ART-EVENT-PAYLOAD-FROZEN-GOLDENS
    - ART-SCHEMA-EVOLUTION-DOC
- id: INV-IDEMPOTENCY-DURABLE-WINDOW
  statement: A keyed append is deduplicated as a true no-op via a durable sidecar (index.idemp - magic FBATID, versioned, crc32fast CRC, atomic write) that survives retention compaction, cold-start, and snapshot independent of event eviction and is restored unconditionally (never rebuilt from segment scan); growth is bounded by a window-priority hybrid where the window is inviolable (a key whose recorded global sequence is within keep_sequences of the frontier is never evicted by the soft max_keys cap, which may only trim out-of-window keys), so a retry of a within-window key is always a no-op regardless of load while a corrupt or missing sidecar degrades to empty (logged, never crashing) and a future on-disk version is a hard error; IdempotencyKey::for_operation derives operation identity from a length-delimited blake3 over domain plus components and is not a payload content hash.
  artifacts:
    - ART-IDEMPOTENCY-DURABLE-SOURCE
    - ART-IDEMPOTENCY-DURABLE-TESTS
- id: INV-ONDISK-FORWARD-COMPAT-CANONICAL
  statement: Every on-disk format declared in the compat matrix opens or fails with exactly one canonical typed error per (writer_version, reader_version) pair - never silent corruption and never a silent rebuild-from-scan downgrade. A reader opening an artifact written at its own live version succeeds (the OpensOK self-row), and an artifact written at a strictly-newer version is a canonical typed refusal. The governed formats and their future-version refusals are - mmap-index (index.fbati, StoreError MmapFutureVersion), checkpoint (index.ckpt, StoreError CheckpointFutureVersion), idempotency-index (index.idemp, StoreError IdempotencyFutureVersion), and visibility-ranges (visibility_ranges.fbv, StoreError HiddenRangesFutureVersion); each refusal is propagated out of cold-start rather than degrading to a scan, while corrupt or older artifacts keep their graceful-rebuild path. The matrix is the live contract, so a bump to an on-disk version const with no matching matrix row is caught because the self-row reader_version is cross-checked against the live supported version. The segment/.fbat format is intentionally excluded - its version is msgpack-encoded (no fixed-offset forge) and a future-version segment already fails closed via CorruptSegment with no silent-degrade path.
  witness_test: crates/core/tests/compat_matrix.rs::compat_matrix_rows_match_declared_outcomes
  artifacts:
    - ART-COMPAT-MATRIX
- id: INV-SYNCBAT-DISPATCH-RECEIPTS
