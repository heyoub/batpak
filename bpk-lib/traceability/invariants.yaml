- id: INV-PAYLOAD-VERSION-NONZERO
  statement: >-
    A typed event payload always carries a non-zero PAYLOAD_VERSION in the event header; the reserved
    legacy sentinel 0 marks an untyped/legacy frame, so the typed-append seam rejects any payload that
    forges PAYLOAD_VERSION = 0 (the derive macro forbids it at compile time and the runtime seam
    forbids a hand-written impl), keeping typed frames distinguishable from legacy frames on read.
  artifacts:
    - ART-PAYLOAD-VERSION-NONZERO-TEST
    - ART-EVENT-PAYLOAD-DECODE-SEAM
  witness_test: crates/core/tests/store_append_behavior.rs::typed_append_rejects_manual_payload_version_zero
- id: INV-PAYLOAD-LENGTH-EXACT
