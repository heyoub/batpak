    and the global sequence — when fed the same seeded operation stream under a fixed
    clock; any divergence between an equivalence-claiming pair is a hard finding.
  witness_test: crates/core/tests/semantic_diff.rs::equivalence_claiming_configs_agree_on_visible_truth
  artifacts:
    - ART-SEMANTIC-DIFF-TESTS
- id: INV-LINEARIZABILITY-SINGLE-WRITER
  statement: >-
    Because batpak commits through a single writer behind a gated visibility watermark,
    the ordered visible history a reader returns is the single-writer linearization order:
    a dense, strictly increasing global_sequence prefix (no gap below the visible
    high-water and no premature visibility), reads are monotonic (a re-query never drops
    or reorders a previously-visible event), two independent readers of the same store
    converge on identical history, and there is no real-time/sequence inversion (if an
    append returns before another is issued, its global_sequence is the smaller one); a
    seeded operation stream against a real Store under a fixed clock witnesses this, and a
    pure checker rejects inverted/gapped/duplicate histories so the property is not vacuous.
  witness_test: crates/core/tests/linearizability.rs::live_store_history_is_linearizable
  artifacts:
    - ART-LINEARIZABILITY-TESTS
