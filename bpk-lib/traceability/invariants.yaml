- id: INV-NO-TOKIO-PROD
  statement: Production dependencies remain runtime-agnostic; Tokio stays out of non-dev dependencies.
  artifacts:
    - ART-CARGO
    - ART-BUILD-RS
- id: INV-EVENT-PAYLOAD-DECODE-BACKCOMPAT
  statement: The single typed-decode seam keeps decoding historical payload bytes as schemas evolve - additive-with-default is absorbed by serde, an older stored payload_version is lifted to the current shape by the registered Upcast chain (in-memory only, stored bytes never rewritten), and a stored version newer than the decoder is a hard FutureVersion error; adding the payload_version header field moves no event content hash or signature.
  artifacts:
    - ART-EVENT-PAYLOAD-DECODE-SEAM
    - ART-EVENT-PAYLOAD-FROZEN-GOLDENS
    - ART-SCHEMA-EVOLUTION-DOC
- id: INV-SYNCBAT-DISPATCH-RECEIPTS
  statement: syncbat checkout dispatch emits at most one completed or failed runtime receipt for resolved operations, emits no receipt for unknown operations, and fails closed when the configured receipt sink fails.
  artifacts:
    - ART-SYNCBAT-SOURCE
    - ART-SYNCBAT-TESTS
    - ART-SYNCBAT-WIRE-GOLDENS
    - ART-ADR-SYNCBAT-CONTRACT
- id: INV-SYNCBAT-REGISTER-CATALOG-DETERMINISTIC
  statement: syncbat durable register catalog rows fold in store sequence order, reject malformed or conflicting lifecycle transitions, and rebuild the same active register after reopen.
  artifacts:
    - ART-SYNCBAT-SOURCE
    - ART-SYNCBAT-TESTS
    - ART-SYNCBAT-WIRE-GOLDENS
    - ART-ADR-SYNCBAT-CONTRACT
- id: INV-NETBAT-LINE-PROTOCOL-STABLE
  statement: netbat request and response frames keep stable NETBAT/1 CALL and OK/ERR line shapes, bounded decode behavior, and deterministic error-code mapping.
  artifacts:
    - ART-NETBAT-SOURCE
    - ART-NETBAT-TESTS
    - ART-NETBAT-WIRE-GOLDENS
    - ART-ADR-NETBAT-CONTRACT
- id: INV-NETBAT-BOUNDARY-THIN
  statement: netbat remains a sync-first boundary over syncbat; it validates and frames calls but does not own handler execution, receipt emission, durable writes, async runtime policy, or application protocol semantics.
  artifacts:
    - ART-NETBAT-SOURCE
    - ART-NETBAT-TESTS
    - ART-ADR-NETBAT-CONTRACT
- id: INV-BIDIRECTIONAL-SUBSTRATE-LANE
  statement: Any non-Rust terminal that can commit events must expose bounded domain-neutral enumeration by coordinate, region, and global commit order, or docs must explicitly state replay requires caller-supplied event IDs and is not substrate-complete.
  artifacts:
    - ART-HBAT-SOURCE
    - ART-HBAT-TESTS
    - ART-HBAT-MANIFEST-EXPORT
    - ART-STORE-QUERY-TRAVERSAL
    - ART-STORE-QUERY-TRAVERSAL-TESTS
    - ART-DX-DOCS
- id: INV-SUBSTRATE-TRAVERSAL-DOMAIN-NEUTRAL
  statement: Traversal terminals return substrate metadata only; they must not expose Moonwalker missions, workflow verbs, movement-graph semantics, receipt_kind dispatch, decoded envelope bodies, or domain replay names.
  artifacts:
    - ART-HBAT-SOURCE
    - ART-HBAT-TESTS
    - ART-HBAT-MANIFEST-EXPORT
    - ART-STORE-QUERY-TRAVERSAL
    - ART-DX-DOCS
- id: INV-EXTERNAL-REPLAY-NO-SIDECAR-TRUTH
  statement: External replay may use caches or indexes, but authoritative reconstruction must be possible through event.query plus event.get plus envelope decoding above batpak; sidecar indexes are projections, not source truth.
  artifacts:
    - ART-HBAT-SOURCE
    - ART-HBAT-TESTS
    - ART-HBAT-MANIFEST-EXPORT
    - ART-STORE-QUERY-TRAVERSAL
    - ART-STORE-QUERY-TRAVERSAL-TESTS
    - ART-DX-DOCS
- id: INV-STORE-SYNC-ONLY
  statement: The Store public API remains synchronous.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-CONFIG
    - ART-ADR-SYNC
- id: INV-STORE-LIFECYCLE-HONESTY
  statement: Store sync and drop paths must surface writer failures honestly and send best-effort shutdown rather than silently succeeding.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-ERROR
    - ART-STORE-LIFECYCLE
    - ART-STORE-RUNTIME-CONTRACTS
- id: INV-STORE-ERROR-TAXONOMY
  statement: Store failure paths must preserve structured error variants instead of laundering failures into defaults or strings.
  artifacts:
    - ART-STORE-ERROR
    - ART-STORE-PROPERTIES
- id: INV-PAYLOAD-LENGTH-EXACT
  statement: Serialized payload lengths must be computed exactly and rejected when they exceed the wire contract.
  artifacts:
    - ART-STORE-APPEND
    - ART-STORE-RUNTIME-CONTRACTS
- id: INV-CLOCK-NOW-US-LIVE
  statement: The store wall-clock helper must produce positive microsecond timestamps that advance with real time.
  artifacts:
    - ART-STORE-CONFIG
    - ART-STORE-PLATFORM
    - ART-STORE-RUNTIME-CONTRACTS
- id: INV-PLATFORM-EVIDENCE-NOT-MEANING
  statement: store::platform may perform target-sensitive machine-contact operations and emit descriptive evidence/profile records, but it must not define batpak durability, replay, visibility, or admission semantics. Store, cold-start, segment, and frontier logic own those guarantees; configured profile mismatch is a hard open-time admission failure.
  artifacts:
    - ART-STORE-PLATFORM
    - ART-STORE-CONFIG
    - ART-STORE-ERROR
    - ART-STORE-PLATFORM-FIXTURES
    - ART-ADR-STORE-PLATFORM
    - ART-STRUCTURAL-CHECK
    - ART-XTASK
    - ART-BUILD-RS
- id: INV-RECEIPT-SEALED
  statement: Receipts are only constructible by gate evaluation, not by external callers.
  artifacts:
    - ART-GUARD-RECEIPT
    - ART-TYPESTATE-TESTS
- id: INV-DANGEROUS-TEST-HOOKS-NONDEFAULT
  statement: Dangerous test hooks are not exposed in default production builds.
  artifacts:
    - ART-STORE-DANGEROUS-TEST-HOOKS
    - ART-STORE-ADVANCED
- id: INV-CACHE-CAPABILITIES-EXPLICIT
  statement: Cache prefetch behavior must be discoverable through an explicit capability surface.
  artifacts:
    - ART-PROJECTION
    - ART-STORE-PROJECTION
    - ART-PROJECTION-TESTS
- id: INV-NATIVE-DELETE-IDEMPOTENT
  statement: NativeCache prefix deletion remains safe and idempotent — repeating a delete_prefix call after entries are already removed must return 0 with no errors.
  artifacts:
    - ART-PROJECTION
    - ART-PROJECTION-TESTS
- id: INV-TRACEABILITY-COMPLETE
  statement: Each important requirement, invariant, and flow links to concrete proving artifacts, and every artifact participates in that graph.
  artifacts:
    - ART-TRACEABILITY
    - ART-TRACEABILITY-CHECK
- id: INV-CONCURRENCY-SCHEDULE-PROOF
  statement: Idempotency, compare-and-set, restart-budget, and compaction-exclusivity semantics remain valid under deterministic schedule exploration.
  artifacts:
    - ART-DETERMINISTIC-CONCURRENCY-TESTS
    - ART-LOOM-CI-LANE
    - ART-STORE-MOD
    - ART-STORE-LIFECYCLE
- id: INV-OBSERVABILITY-FAILURE-PATHS
  statement: Named flows emit enough telemetry to distinguish successful execution from cache-degraded or causal-reaction execution paths.
  artifacts:
    - ART-OBSERVABILITY-TESTS
    - ART-STORE-PROJECTION
    - ART-STORE-MOD
- id: INV-CANONICAL-CONTAINER-CI
  statement: The canonical Linux CI path executes inside the checked-in devcontainer image rather than a separately hand-installed host environment.
  artifacts:
    - ART-DEVCONTAINER
    - ART-DEVCONTAINER-RUNNER
    - ART-CI
- id: INV-GROUP-COMMIT-IDEMPOTENCY
  statement: Group commit (batch > 1) structurally requires idempotency keys on every append, enforced at append time via StoreError::IdempotencyRequired.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-APPEND
    - ART-GROUP-COMMIT-TESTS
- id: INV-CHECKPOINT-V2-INTERNED
  statement: Index checkpoint v2 and later persist an interner snapshot and use InternId u32s instead of raw strings, saving ~22 bytes per entry and enabling fast cold-start restore. SIDX footers provide per-segment fast path.
  artifacts:
    - ART-STORE-CHECKPOINT
    - ART-STORE-INTERNER
    - ART-STORE-SIDX
- id: INV-CANONICAL-PATCH-STABILITY
  statement: Schema-versioned evidence report bodies keep stable canonical bytes across patch releases; changing a v1 body shape requires an intentional golden fixture update or a new versioned body.
  artifacts:
    - ART-SCHEMA-SNAPSHOT
    - ART-CANONICAL-PATCH-STABILITY-TESTS
    - ART-ADR-CANONICAL-ENCODING
- id: INV-MMAP-SEALED-READS
  statement: Sealed segment reads use zero-copy memory-mapped I/O via memmap2. Active segment uses FD cache with pread (Unix) or seek+read (Windows).
  artifacts:
    - ART-STORE-PLATFORM
    - ART-STORE-SCAN
    - ART-STORE-CONFIG
- id: INV-OPEN-REPORT-RECEIPT
  statement: >-
    Cold-start observability is a real receipt surface: diagnostics().open_report and
    the open-report observer expose current reopen fallback totals/histograms plus
    cumulative fallback totals/histograms persisted through mmap/checkpoint
    artifacts; mutable opens also append one durable SYSTEM_OPEN_COMPLETED
    lifecycle event while read-only opens remain side-effect free.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-REBUILD
    - ART-STORE-CHECKPOINT
    - ART-STORE-MMAP
    - ART-OBSERVABILITY-TESTS
- id: INV-COLUMNAR-REPLACES-DASHMAP
  statement: The scan index always keeps the base AoS by_fact and scope_entities maps, and may additionally fan out into SoA, SoAoS, and AoSoA64 overlays. IndexTopology is the live public model for enabling those overlays.
  artifacts:
    - ART-STORE-COLUMNAR
    - ART-STORE-CONFIG
- id: INV-MULTI-VIEW-PUBLISH-AFTER-VIEW-SYNC
  statement: Writer visibility publish happens only after every active index view has been populated; readers must observe either all view updates for a sequence range or none of them.
  artifacts:
    - ART-STORE-INDEX
    - ART-STORE-WRITER
    - ART-CONTROL-PLANE-TESTS
    - ART-ADR-CONTROL-PLANE
- id: INV-FENCE-CANCELLED-STAYS-HIDDEN
  statement: Cancelling a public visibility fence leaves its writes durable but hidden, and that hidden-range state survives reopen, snapshot export, and fast-start restore.
  artifacts:
    - ART-STORE-INDEX
    - ART-STORE-WRITER
    - ART-STORE-HIDDEN-RANGES
    - ART-STORE-LIFECYCLE
    - ART-STORE-REBUILD
    - ART-CONTROL-PLANE-TESTS
    - ART-ADR-CONTROL-PLANE
- id: INV-SCHEMA-VERSION-ISOLATION
  statement: Cached projections are keyed by entity + schema_version. Different versions get separate cache slots, preventing stale cached values from being served to new code.
  artifacts:
    - ART-STORE-PROJECTION
    - ART-UNIFIED-TESTS
- id: INV-REPLAY-LANE-SELECTION
  statement: Projection replay lane selection stays sealed to the built-in `ProjectionInput` modes, with `ReplayLane` naming the live default-vs-raw split and `RawMsgpackInput` remaining a real throughput lane rather than doc-only decoration.
  artifacts:
    - ART-EVENT-SOURCING
    - ART-PROJECTION-TESTS
    - ART-REPLAY-TESTS
    - ART-ADR-RESTORE-PLANNER
- id: INV-DELIVERY-AT-LEAST-ONCE-WITNESS
  statement: cursor_worker and typed reactor handlers receive Option<&AtLeastOnce> on every delivered batch; Some is produced iff the worker config declares a checkpoint_id, and the witness CheckpointId matches that config.
  artifacts:
    - ART-DELIVERY-WITNESS-SURFACE
    - ART-DELIVERY-WITNESS-TESTS
    - ART-ADR-AT-LEAST-ONCE-WITNESS
    - ART-DX-DOCS
    - ART-EXAMPLES
- id: INV-BATCH-ATOMIC-VISIBILITY
  statement: Batch append events are invisible to queries, cursors, and subscriptions until the entire batch is committed, fsynced, and atomically published via SequenceGate::publish(). All read methods filter by visible_sequence. No partial batch is ever observable. Proved by loom model and concurrent-read integration test.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-INDEX
    - ART-STORE-WRITER
    - ART-BATCH-TESTS
    - ART-SUBSCRIPTION-TESTS
    - ART-DETERMINISTIC-CONCURRENCY-TESTS
    - ART-LOOM-CI-LANE
- id: INV-BATCH-CRASH-RECOVERY
  statement: Incomplete batches (BEGIN without matching COMMIT) are discarded during cold-start segment scan. Cross-segment batch state persists across segment boundaries to handle batches spanning rotation points.
  artifacts:
    - ART-STORE-SCAN
    - ART-BATCH-TESTS
- id: INV-PREPARED-BATCH-STAGING-EQUIVALENCE
  statement: Prepared-batch staging and fresh batch construction must commit, reopen, and publish the same runtime-visible outcomes; reused staged packets may optimize allocation but must not alter persisted or replayed semantics.
  artifacts:
    - ART-STORE-WRITER
    - ART-STORE-APPEND
    - ART-BATCH-STAGING-REGRESSION
- id: INV-POSITION-HINT-PERSISTENCE
  statement: Append position hints may supply only DAG lane/depth; writer-owned HLC wall/counter and sequence remain authoritative, and non-root lane/depth must survive live commit, mmap reopen, checkpoint reopen, SIDX-backed reconstruction, and full rebuild.
  artifacts:
    - ART-STORE-APPEND
    - ART-STORE-WRITER
    - ART-STORE-REBUILD
    - ART-STORE-SIDX
    - ART-STORE-CHECKPOINT
    - ART-STORE-MMAP
    - ART-DAG-POSITION-HINT-TESTS
    - ART-ADR-POSITION-HINTS
    - ART-DX-DOCS
    - ART-RELEASE-HISTORY
- id: INV-SIDX-TIMESTAMP-US-APPROXIMATION
  statement: SIDX-accelerated cold start reconstructs timestamp_us from persisted wall_ms to the nearest millisecond; this best-effort value is suitable for age/display APIs but is not a sub-millisecond ordering contract.
  artifacts:
    - ART-EVENT-SOURCING
    - ART-STORE-SIDX
    - ART-STORE-REBUILD
    - ART-DX-DOCS
- id: INV-FAULT-INJECT-GATED
  statement: Fault injection infrastructure (InjectionPoint, FaultInjector trait, maybe_inject hooks, writer panic test hooks, and dangerous frontier mutation APIs) is compiled only under the opt-in dangerous-test-hooks feature gate; default downstream builds must not expose that surface.
  artifacts:
    - ART-STORE-FAULT
    - ART-STORE-CONFIG
- id: INV-FRONTIER-MONOTONIC
  statement: Each frontier watermark (accepted, written, durable, visible, emitted, applied) advances monotonically; advance methods take max with the proposed point and never permit backward motion.
  artifacts:
    - ART-FRONTIER-WATERMARK-STATE
    - ART-FRONTIER-SEMANTICS-TESTS
    - ART-ADR-DURABLE-FRONTIER
- id: INV-FRONTIER-ORDERING
  statement: At every torn-free observation, accepted_hlc >= written_hlc >= durable_hlc, accepted_hlc >= visible_hlc >= applied_hlc, and emitted_hlc >= visible_hlc.
  artifacts:
    - ART-FRONTIER-WATERMARK-STATE
    - ART-FRONTIER-TYPES
    - ART-FRONTIER-SEMANTICS-TESTS
- id: INV-FRONTIER-TORN-FREE
  statement: FrontierView is composed under a single watermark mutex acquisition; visible+emitted advances at commit time use a composite advance helper that holds the lock across both field updates.
  artifacts:
    - ART-FRONTIER-WATERMARK-STATE
    - ART-FRONTIER-SEMANTICS-TESTS
- id: INV-FRONTIER-OPEN-MONOTONIC
  statement: On Store::open and Store::open_read_only, the bootstrap open_hlc satisfies open_hlc >= max_recovered_hlc and open_hlc >= last_close_hlc, where last_close_hlc is the highest HLC carried by recovered SYSTEM_CLOSE_COMPLETED lifecycle events. This monotonicity is enforced post-emit and surfaces as StoreError::InvariantViolation if violated.
  artifacts:
    - ART-FRONTIER-BOOTSTRAP
    - ART-FRONTIER-SEMANTICS-TESTS
    - ART-FRONTIER-CHAOS-TESTS
- id: INV-FRONTIER-APPLIED-MIN
  statement: applied_hlc equals the minimum HLC across all registered projections; with zero registered projections it remains at the bootstrap open_hlc, never drifting forward. wait_for_applied honors this min so a single lagging projection blocks the wait until it catches up.
  artifacts:
    - ART-FRONTIER-PROJECTION-REGISTRY
    - ART-FRONTIER-WATERMARK-STATE
    - ART-FRONTIER-SEMANTICS-TESTS
    - ART-FRONTIER-WAIT-TESTS
- id: INV-FRONTIER-FAULT-ORDINALS
  statement: SingleAppendStart fires before any watermark advance, SingleAppendWritten fires after written advance and before durable, and SingleAppendPublished fires after visible+emitted advance and before the receipt is returned.
  artifacts:
    - ART-FRONTIER-FAULT-INJECTION
    - ART-FRONTIER-SEMANTICS-TESTS
- id: INV-FRONTIER-DURABLE-COVERS-RECOVERED
  statement: On reopen after any crash or device failure, durable_hlc covers every event observable via query, and durable_hlc is monotonic across crash boundaries (recovered_durable_hlc >= pre_failure_durable_hlc). batpak makes no claim about which specific in-flight events survive a particular crash; it only guarantees that the durable frontier honestly classifies whatever was preserved.
  artifacts:
    - ART-CHAOS-HARNESS
    - ART-CHAOS-BATCH-COMMIT-WRITTEN
    - ART-FRONTIER-CHAOS-TESTS
    - ART-FRONTIER-SEMANTICS-TESTS
- id: INV-FRONTIER-WAIT-MONOTONIC
  statement: wait_for_durable, wait_for_applied, and wait_for_visible return Ok(()) only after observing the corresponding watermark >= target on a state mutation under the same lock that issued the notify; spurious wakeups never satisfy the wait.
  artifacts:
    - ART-FRONTIER-WAIT-API
    - ART-FRONTIER-WAIT-TESTS
    - ART-ADR-DURABILITY-GATING
- id: INV-FRONTIER-APPEND-GATE-HONORED
  statement: When AppendOptions::gate is Some(DurabilityGate { kind, timeout }), Store::append_with_options and Store::append_batch_with_options return only after the corresponding watermark crosses the appended event's HLC, or return StoreError::WaitTimeout. The committed event is queryable in both cases; the timeout reflects the gate guarantee, not the commit.
  artifacts:
    - ART-FRONTIER-APPEND-GATE
    - ART-FRONTIER-WAIT-API
    - ART-FRONTIER-WAIT-TESTS
    - ART-ADR-DURABILITY-GATING
- id: INV-CHAOS-LINUX-ONLY
  statement: The chaos harness uses Linux device-mapper primitives and is unconditionally cfg'd off on non-Linux targets; durability proofs derived from this harness apply to Linux kernels only.
  artifacts:
    - ART-CHAOS-HARNESS
    - ART-CHAOS-DM-FLAKEY
    - ART-ADR-CHAOS-HARNESS
- id: INV-ALLOW-IS-DESIGN
  statement: "Every `#[allow(...)]` in the repo is a deliberate design decision, not a silencer. The allow carries a `// justifies <prose>` comment on the same or preceding line that cites at least one resolvable anchor — an INV-id from this catalog, an `ADR-NNNN` root ADR file, or a concrete repo path (`crates/core/src/...`, `crates/core/tests/...`, `crates/core/examples/...`, `crates/macros/...`, `crates/macros-support/...`) — so the rationale is traceable, not narrative-only."
  artifacts:
    - ART-DOCTOR
    - ART-STRUCTURAL-CHECK
    - ART-BUILD-RS
- id: INV-EXAMPLES-OBSERVABLE-OUTPUT
  statement: "Examples in crates/core/examples/*.rs prove shipped behaviour by producing observable stdout/stderr output that a reader can see; print_stdout, print_stderr, wildcard match arms over enums, and bounded integer narrowing in teaching fixtures are expected for that role. The Teaches-header convention keeps each example focused on a single pattern."
  artifacts:
    - ART-EXAMPLES
- id: INV-MACRO-BOUNDED-CAST
  statement: "Narrowing integer casts inside batpak-macros (under crates/macros) are preceded by an explicit u8::MAX / u16::MAX comparison that returns an error before the cast, so clippy::cast_possible_truncation at the cast site cannot fire."
  artifacts:
    - ART-MACROS
- id: INV-GENERATED-WITNESS-PIN
  statement: "Derive-generated handler-signature pin consts (for example _HANDLER_PIN_<i>, __batpak_kind_collision_check_<Ident>) are type-check witnesses — they exist to make a mismatched handler signature fail compilation, have no runtime role, and embed the user's ident (often CamelCase or snake). non_upper_case_globals, non_snake_case, and dead_code are suppressed on those specific generated items only."
  artifacts:
    - ART-MACROS
- id: INV-LITERAL-REGEX-UNWRAP-SAFE
  statement: "unwrap / expect on regex::Regex::new with a literal string pattern inside tool code is safe because the pattern is a compile-time constant string with known-valid regex syntax; the call cannot fire in any reachable execution of the tool."
  artifacts:
    - ART-DOCTOR
- id: INV-TEST-PANIC-AS-ASSERTION
  statement: "Test bodies under crates/core/tests/ use panic!, unwrap, and expect as the assertion style — when a test precondition, fixture setup, or invariant check fails, the panic is the test failure signal. File-level #![allow(clippy::unwrap_used, clippy::panic)] is the acceptable scope for this idiom. Tests using panic! for invariant failures and test-local FaultInjector impls that panic in writer threads must opt out of clippy::panic at module scope and document the exception in a leading \"justifies:\" comment."
  artifacts:
    - ART-TESTS
    - ART-FRONTIER-CHAOS-TESTS
- id: INV-BUILD-FAIL-FAST
  statement: "crates/core/build.rs halts the build on invariant violations with a cargo-parseable explanation. Panic sites are consolidated through the crate-private fail helper so the policy is expressed in one place; the file-level #![allow(clippy::panic)] attribute covers that single documented exit path."
  artifacts:
    - ART-BUILD-RS
- id: INV-TYPESTATE-OPEN-HAS-WRITER
  statement: "Store<Open> is only constructible by Store::open after the writer thread is initialized; Store::<Open>::writer_ref() is the single crate-private access point for the writer handle, and its expect is a typestate invariant assertion that cannot fail in reachable code."
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-LIFECYCLE
- id: INV-WIRE-ROUNDTRIP-TOTALITY
  statement: Public wire/event/id surfaces round-trip every valid generated value and reject malformed bytes or identifiers without partial decoding.
  artifacts:
    - ART-WIRE-FORMAT-TESTS
- id: INV-PERFORMANCE-GATES-ENFORCED
  statement: Hardware-dependent performance gates remain explicit ignored tests and are runnable only through the repo-owned perf-gates command surface.
  artifacts:
    - ART-PERF-GATES
    - ART-XTASK
- id: INV-SUBSCRIPTION-STATE-MACHINE
  statement: Subscription delivery follows the open, receive, close state machine without fabricating events or hiding a closed producer.
  artifacts:
    - ART-SUBSCRIPTION-TESTS
- id: INV-TYPELEVEL-COMBINATOR-LAWS
  statement: Public outcome and monadic combinators preserve their type-level success, retry, cancelled, and error law shapes under property tests.
  artifacts:
    - ART-COMBINATOR-LAW-TESTS
- id: INV-HASH-CHAIN-INTEGRITY
  statement: Hash-chain tests preserve append-order integrity by detecting reordered, missing, or mutated event payload links.
  artifacts:
    - ART-HASH-CHAIN-TESTS
- id: INV-OUTBOX-DROP-SAFETY
  statement: Dropping a producer outbox without flush cannot publish buffered events; only explicit flush/submit paths cross the writer boundary.
  artifacts:
    - ART-OUTBOX-TESTS
- id: INV-COLD-START-ARTIFACTS
  statement: Clean close and restart paths produce and consume the expected checkpoint, mmap, and segment artifacts without trusting stale fast-start metadata.
  artifacts:
    - ART-COLD-START-RECOVERY-TESTS
- id: INV-INDEX-FILTER-COMPOSES
  statement: Index filter composition over kind, scope, entity, and topology overlays returns the same logical result set as the authoritative scan.
  artifacts:
    - ART-INDEX-FILTER-COMPOSITION-TESTS
- id: INV-NO-DEAD-CODE-SILENCERS
  statement: "dead_code lint suppressions are banned in tracked Rust source. The AST walker in shared_checks::collect_dead_code_silencer_sites rejects #[allow(dead_code)], #[expect(dead_code)], crate-inner forms, lint-list forms containing dead_code, #[allow(unused)] and #[expect(unused)] (the `unused` group subsumes dead_code), and cfg_attr wrappers around any of those, including multi-line wrappers. The only escape hatch is an exact-site entry in traceability/dead_code_silencer_allowlist.yaml with non-empty reason + adr fields that resolve to a real ADR. The honest responses to a dead_code warning are #[cfg(test)] for test-only code, deletion for truly unused code, or restructuring (workspace crate, narrower module, finer-grained #[path] include) so the compilation unit matches actual ownership. See ADR-0012."
  artifacts:
    - ART-BUILD-RS
    - ART-STRUCTURAL-CHECK
    - ART-DEAD-CODE-SILENCER-ALLOWLIST
- id: INV-JOURNAL-SINGLE-LIVE-OWNER
  statement: >-
    A journal is one Store root at one data_dir with one live owner; mutable and read-only opens
    both fail with StoreLocked while another owner holds the directory lock.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-LOCKING-TESTS
    - ART-DX-DOCS
- id: INV-JOURNAL-WRITER-SERIALIZES-COMMITS
  statement: >-
    All committed events in one journal are serialized through the writer-owned commit path;
    Coordinate does not create an independent physical writer or global_sequence timeline.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-WRITER
    - ART-DX-DOCS
- id: INV-COORDINATE-IS-LOGICAL-STREAM
  statement: >-
    Coordinate names a logical context stream inside one journal; it provides logical
    ordering and addressing, not physical sharding or cross-directory consistency.
  artifacts:
    - ART-STORE-APPEND
    - ART-DX-DOCS
- id: INV-CROSS-DIRECTORY-CONSISTENCY-PRODUCT-OWNED
  statement: >-
    Cross-data_dir consistency is outside Store invariants; multi-journal systems compose by
    product-owned routing, observations, receipts, and local policy.
  artifacts:
    - ART-STORE-MOD
    - ART-DX-DOCS
- id: INV-CONTEXT-VIEWS-DERIVED-FROM-HISTORY
