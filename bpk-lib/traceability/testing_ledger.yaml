# Testing ledger — machine-law data for the doctrine-bearing harness suites.
#
# This is the live home of the testing ledger the integrity tool owns. It
# records the current doctrine-bearing suites and their primary harness pattern.
# Coverage is treated as a consequence of harness density, not as the target
# itself; where a delta is unmeasured the entry says so explicitly instead of
# pretending.
#
# Loaders:
#   - tools/integrity/src/harness_lints.rs   (schema + location/command lints)
#   - tools/integrity/src/invariant_bridge.rs (ledger-as-coverage-witness)
#   - tools/integrity/src/architecture_ir.rs  (invariant_gate_links projection)
#
# Required per entry: pattern, status, locations, commands, coverage_delta,
# mutation_delta, blind_spots. `pattern` must be one of the five+ repo-owned
# harness patterns and must equal `section`. `invariants` lists the catalog
# INV-* ids this entry witnesses (citation source for the invariant bridge).
# `status` is one of {green, amber, red, unmeasured}. Commands must start with
# an approved prefix: `cargo test`, `BATPAK_RUN_CHAOS=1 cargo test`,
# `CARGO_INCREMENTAL=0 cargo mutants`, or `cargo xtask`. The full testing
# doctrine prose now lives in CONFORMANCE.md ("Testing doctrine").

