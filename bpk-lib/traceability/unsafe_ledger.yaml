# Unsafe basement ledger (kernel plan §10.8 / S-LEDGER plan:506).
#
# The SINGLE source of truth reconciling every `unsafe` block in a sanctioned
# bvisor basement against a documented justification. Two sanctioned basement
# roots, same `/sys.rs`-or-`/sys/` shape:
#   - the backend basement:  `crates/bvisor/src/backend/<os>/sys.rs` or `sys/`
#   - the launcher basement: `crates/bvisor/launcher/<os>/sys.rs` or `sys/`
#     (the single-threaded Linux confinement launcher's real-OS unsafe —
#     memfd/fstat/exec). The launcher basement is empty for now (no entries
#     below) ⇒ vacuously green but LIVE: the first launcher unsafe block must
#     anchor + register here.
# The `integrity unsafe-ledger` gate (folded
# into `structural-check`) fails CLOSED if:
#   - a basement `unsafe` block carries NO `LEDGER:<id>` anchor (unanchored), OR
#   - two live `unsafe` blocks share one anchor id (duplicate), OR
#   - a basement `unsafe` block has NO matching ledger entry (unregistered), OR
#   - a ledger entry matches NO live anchored `unsafe` block (stale entry).
#
# Each `unsafe` block is bound to its entry by a STABLE COMMENT ANCHOR — a
# `LEDGER:<id>` token (`<id>` is kebab `[a-z0-9-]+`) embedded in the `//` comment
# block IMMEDIATELY above the `unsafe` keyword (the standard `// SAFETY:` site).
# Anchoring by id, not `file:line`, lets blocks move freely as the source edits.
#
# Each entry MUST cite:
#   file:               repo-relative path to the basement file
#   anchor:             the `LEDGER:<id>` id in the block's SAFETY comment
#   syscall:            the syscall / FFI call the block performs (e.g. "clone3")
#   safety_invariant:   the invariant the caller upholds to make it sound
#   requirement:        the RequirementKind the unsafe backs (e.g. "ChildSpawn")
#
# STEP (b) part 1 — REAL Linux filesystem confinement (landlock). Two `unsafe`
# blocks in the Linux basement, both registered below. Budget/seccomp/namespace
# basements remain unimplemented (their profile() cells stay Unsupported), so no
# further unsafe is registered until those chunks land.
entries:
  - file: crates/bvisor/src/backend/linux/sys.rs
    anchor: linux-landlock-abi-probe
    syscall: landlock_create_ruleset(NULL, 0, LANDLOCK_CREATE_RULESET_VERSION)
    safety_invariant: >-
      Invoked in its documented VERSION-QUERY form (attr=NULL, size=0,
      flags=LANDLOCK_CREATE_RULESET_VERSION). In this form the kernel reads no
      user memory, creates no fd, and mutates nothing — it only returns the
      supported ABI integer (>=0) or -1/errno. Sound for any caller state; the
      NULL/0 pair is exactly what the version query requires.
    requirement: Filesystem
  - file: crates/bvisor/src/backend/linux/sys.rs
    anchor: linux-landlock-pre-exec-apply
    syscall: pre_exec (fork child applies the parent-built landlock ruleset via restrict_self before execve)
    safety_invariant: >-
      The pre_exec closure runs in the forked child between fork and exec and is
      async-signal-safe. The ruleset — including ALL heap allocation, the path-fd
      opens, and the landlock_create_ruleset/landlock_add_rule syscalls — is built
      BEFORE the fork by build_ruleset() in the parent; the created ruleset fd is
      inherited by the child. The post-fork closure therefore performs NO heap
      allocation and takes no lock: it calls only RulesetCreated::restrict_self(),
      i.e. prctl(PR_SET_NO_NEW_PRIVS) plus landlock_restrict_self on the inherited
      fd (both async-signal-safe syscalls). It captures only an owned
      Option<RulesetCreated> (an owned fd), moves it out via .take() on its single
      invocation, and on any error returns an io::Error that pre_exec propagates as
      a FAILED spawn, so the workload never runs unconfined (fail closed).
    requirement: Filesystem

  # ── Single-threaded Linux confinement LAUNCHER basement (kernel plan §10.8).
  # The coordinator (main.rs, SAFE) validates + decides; the child (clone3,
  # async-signal-safe window) scrubs ambient authority, applies the parent-built
  # landlock ruleset via restrict_self (when scheduled), then execs. Every unsafe
  # block lives in launcher/linux/sys.rs and is anchored here.
  #
  # NOTE on the landlock-restrict step: RulesetCreated::restrict_self() is itself a
  # SAFE call (prctl + landlock_restrict_self on an inherited fd). It runs INSIDE the
  # child-window unsafe dispatch (anchor `linux-launcher-child-window`) and rides the
  # parent-built ruleset fd — so it has no SEPARATE unsafe block and no separate
  # ledger entry; its safety is folded into the child-window entry below. The new
  # landlock unsafe blocks the Confinement chunk DID add are the raw ABI probe
  # (`linux-launcher-landlock-abi`), the inherited-root-fd borrow that builds each
  # PathBeneath rule (`linux-launcher-landlock-root-fd`), and the ruleset-fd CLOEXEC
  # set (`linux-launcher-set-cloexec`).
  - file: crates/bvisor/launcher/linux/sys.rs
    anchor: linux-launcher-landlock-abi
    syscall: landlock_create_ruleset(NULL, 0, LANDLOCK_CREATE_RULESET_VERSION)
    safety_invariant: >-
      Coordinator-side (single-threaded, pre-clone3) live-ABI probe. landlock_create_ruleset
      is invoked in its documented VERSION-QUERY form (attr=NULL, size=0, flags=
      LANDLOCK_CREATE_RULESET_VERSION): the kernel reads NO user memory, creates NO fd,
      and mutates nothing — it only returns the supported ABI integer (>=0) or -1/errno.
      No pointer is dereferenced. The launcher floors confinement at this probe (a result
      below LANDLOCK_ABI_FLOOR_RAW ⇒ the landlock action is refused), so it never advertises
      a confinement the live kernel cannot enforce. Sound for any caller state.
    requirement: Filesystem
  - file: crates/bvisor/launcher/linux/sys.rs
    anchor: linux-launcher-landlock-root-fd
    syscall: BorrowedFd::borrow_raw(root_fd) — borrow an inherited root dir fd to build a PathBeneath rule
    safety_invariant: >-
      Coordinator-side (parent, pre-clone3), inside build_landlock_ruleset. Each root.fd
      is an inherited directory descriptor the host opened and the coordinator ALREADY
      fstat-validated as the declared read/write ROOT (a directory of the declared
      writability). We borrow_raw it for EXACTLY the duration of the add_rule call —
      BorrowedFd neither closes nor takes ownership and does not outlive the loop
      iteration, so the launcher's fd accounting is unchanged and there is no double-close.
      Landlock builds the PathBeneath rule from this inherited fd, NEVER by reopening a path
      (the CVE-2019-5736 / Leaky-Vessels reopen race the protocol forbids). No raw memory
      is dereferenced. Sound for any valid open root fd.
    requirement: Filesystem
  - file: crates/bvisor/launcher/linux/sys.rs
    anchor: linux-launcher-set-cloexec
    syscall: fcntl(fd, F_GETFD) + fcntl(fd, F_SETFD, flags | FD_CLOEXEC)
    safety_invariant: >-
      Coordinator-side (parent, pre-clone3) fcntl pair on an inherited descriptor the
      launcher owns — a landlock ruleset fd it JUST created. F_GETFD only READS the fd
      flags; F_SETFD only WRITES the CLOEXEC bit. The fd is passed as a plain RawFd with
      no Rust value wrapping it, so there is no aliasing and no double-close. CLOEXEC is
      set so a successful workload fexecve auto-closes the ruleset fd (no leak into the
      workload), while the fd stays open across the child's restrict_self (CLOEXEC acts at
      exec, not before). No pointer is dereferenced. A -1 failure is ignored (best-effort).
    requirement: Filesystem
  - file: crates/bvisor/launcher/linux/sys.rs
    anchor: linux-launcher-read-fd
    syscall: File::from_raw_fd + read_to_end (drain the plan fd), into_raw_fd (release without close)
    safety_invariant: >-
      Runs in the COORDINATOR (single-threaded, before clone3 — allocation is
      fine). The fd is an inherited descriptor the host opened and handed the
      launcher via a documented env-named slot; it is adopted into a File ONLY to
      drain it, then released with into_raw_fd WITHOUT closing, so the caller
      retains exactly the fd it passed (no double-close, no leak; fd accounting
      stays exact). No raw pointer is dereferenced; only safe File reads run
      between adopt and release.
    requirement: InheritedFds
  - file: crates/bvisor/launcher/linux/sys.rs
    anchor: linux-launcher-fstat
    syscall: fstat(fd, &mut stat) + fcntl(fd, F_GETFL)
    safety_invariant: >-
      Coordinator-side pure observation. The stat struct is zero-initialised and
      passed by &mut to fstat, which only WRITES it and reads nothing from user
      memory beyond that out-pointer; fcntl(F_GETFL) reads only the kernel's
      file-status flags. The fd is borrowed, not consumed — no fd is created or
      closed. On error each returns -1 and the OS errno is surfaced. Sound for any
      valid open fd the host handed the launcher.
    requirement: InheritedFds
  - file: crates/bvisor/launcher/linux/sys.rs
    anchor: linux-launcher-adopt-fd
    syscall: File::from_raw_fd (take ownership of the control / error-pipe fd)
    safety_invariant: >-
      Coordinator-side. The fd is an inherited descriptor the host opened for the
      launcher (control channel / error-pipe read end), named via a documented env
      slot. The returned File takes exclusive ownership of exactly this one fd and
      closes it on drop; the caller passes each such fd here AT MOST ONCE, so there
      is no aliasing and no double-close. No raw pointer is dereferenced.
    requirement: ControlChannel
  - file: crates/bvisor/launcher/linux/sys.rs
    anchor: linux-launcher-clone3-child
    syscall: clone3 (raw syscall) + the async-signal-safe child branch (sigprocmask/close/fchdir/restrict_self/fexecve/write/_exit)
    safety_invariant: >-
      clone3 is invoked with a correctly sized clone_args (flags=0, exit_signal=
      SIGCHLD) BUILT IN THE SINGLE-THREADED PARENT. The PARENT branch (rc>0) only
      returns the child pid (and drops its copy of the optional ruleset fd — the child
      holds its own inherited copy, so the parent drop does not affect confinement).
      The CHILD branch (rc==0) is the async-signal-safe window: it touches ONLY the
      pre-built ChildExecPlan (argv/envp NUL-terminated pointer arrays into parent-owned
      CStrings, the scrub close-list, and the exec/cwd/error fds — ALL allocated by
      ChildExecPlan::build BEFORE this call) plus the OPTIONAL parent-built landlock
      ruleset (whose every allocation + add_rule syscall ran in the parent), by INDEXING
      already-mapped copy-on-write memory, and issues ONLY async-signal-safe syscalls:
      sigprocmask (empty mask), close (each scrub fd), optional fchdir, restrict_self
      (prctl(PR_SET_NO_NEW_PRIVS) + landlock_restrict_self on the inherited ruleset fd —
      allocation-free, applied AFTER the scrub and BEFORE fexecve), fexecve (exec rides
      the fd, no path reopen), write (errno on failure), _exit. It performs NO heap
      allocation, takes NO lock, and calls NO allocating Rust std; no destructor runs and
      no unwinding crosses the fork (the child paths either fexecve-replace the image or
      _exit without returning into Rust). On success fexecve replaces the image and the
      O_CLOEXEC error fd (and the CLOEXEC ruleset fd) auto-close, which the parent reads
      as EOF; on ANY child failure (including a restrict_self error) the child writes the
      errno to the error fd and _exit(127)s, so the target NEVER runs unconfined and the
      parent observes the fault (fail closed).
    requirement: ChildSpawn
  - file: crates/bvisor/launcher/linux/sys.rs
    anchor: linux-launcher-child-window
    syscall: run_child dispatch (the rc==0 clone3 child branch — async-signal-safe sigprocmask/close/fchdir/restrict_self/fexecve/write/_exit)
    safety_invariant: >-
      The call site of the unsafe `run_child` fn, reached ONLY in the `rc == 0`
      clone3 CHILD branch — the async-signal-safe window. run_child performs ONLY
      async-signal-safe syscalls on the PRE-BUILT ChildExecPlan (argv/envp pointer
      arrays into parent-owned CStrings, the scrub close-list, the exec/cwd/error
      fds — ALL allocated by ChildExecPlan::build BEFORE clone3) and the OPTIONAL
      parent-built landlock ruleset (every allocation + add_rule syscall ran in the
      parent), indexing already-mapped copy-on-write memory. It performs NO heap
      allocation, takes NO lock, and DIVERGES: it either fexecve-replaces the image or
      _exit(127)s after writing the errno, so no destructor runs and no unwinding
      crosses the fork. The CONFINEMENT step is RulesetCreated::restrict_self() — a SAFE
      call (prctl(PR_SET_NO_NEW_PRIVS) + landlock_restrict_self on the inherited ruleset
      fd, allocation-free) run AFTER the scrub and BEFORE fexecve; on its error the child
      child_fails (errno → pipe → _exit) so the target NEVER runs unconfined. The scrub
      closes via raw SYS_close (NOT libc::close) to bypass std's owned-fd close guard in
      the forked child.
    requirement: ChildSpawn
  - file: crates/bvisor/launcher/linux/sys.rs
    anchor: linux-launcher-clone-args-zero
    syscall: mem::zeroed::<clone_args>() (build the clone3 argument)
    safety_invariant: >-
      clone_args is a C-layout struct of plain integer fields (no references, no
      NonNull, no padding-sensitive invariant), so the all-zero bit pattern is a
      valid inhabitant. The struct is built in the single-threaded parent and the
      used fields (exit_signal) are overwritten before it is passed to clone3. No
      pointer is dereferenced here.
    requirement: ChildSpawn
  - file: crates/bvisor/launcher/linux/sys.rs
    anchor: linux-launcher-close-fd
    syscall: close (raw SYS_close on the coordinator's error-pipe write-end copy)
    safety_invariant: >-
      Coordinator-side single raw close on an inherited descriptor the launcher
      owns (its copy of the error-pipe WRITE end), so that only the child retains a
      write end and the read end can reach EOF. The fd is passed as a plain RawFd
      with no Rust value wrapping it, so there is no aliasing and no double-free of
      an owned handle; the raw syscall is used instead of a File drop precisely so a
      best-effort close cannot abort the process if the fd is already gone. No
      pointer is dereferenced. A failure is ignored.
    requirement: ControlChannel
  - file: crates/bvisor/launcher/linux/sys.rs
    anchor: linux-launcher-waitid
    syscall: waitid(P_PID, pid, &mut siginfo, WEXITED)
    safety_invariant: >-
      Coordinator-side (parent) reaping. siginfo_t is zero-initialised and passed
      by &mut to waitid, which only WRITES it; WEXITED waits for the child's
      terminal state. pid is the child this launcher just created via clone3, so the
      parent is entitled to reap it. No user memory is read through a raw pointer
      beyond the out-siginfo. Best-effort — a failure is ignored because the error
      pipe, not the exit code, already decided the launch outcome.
    requirement: ChildSpawn
