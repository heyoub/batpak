- id: OBS-CADENCE-GT-1-VISIBLE-EXCEEDS-DURABLE
  status: current-fact
  statement: >
    On single append with sync.every_n_events > 1 and no DurabilityGate set on
    AppendOptions, visible_hlc can exceed durable_hlc until the next
    explicit or cadence-driven sync because publish runs after frame-write
    regardless of sync cadence. Batch append and cadence=1 do not exhibit this
    gap at the observation points defended by the durable frontier semantics
    harness. Callers can opt into DurabilityGate { kind:
    WatermarkKind::Durable, timeout } to suppress this skew at append time at
    the cost of blocking until cadence is reached.
  evidence:
    - "crates/core/tests/durable_frontier_semantics_frontier.rs :: single_append_cadence_gt_1_visible_exceeds_durable_frontier"
    - "crates/core/tests/durable_frontier_semantics_frontier.rs :: frontier_visible_minus_durable_seq_is_positive_under_cadence_gt_1"
    - "crates/core/tests/durable_frontier_semantics_frontier.rs :: single_append_published_fault_fires_after_visibility_before_receipt"
    - "crates/core/tests/durable_frontier_waits.rs :: wait_for_visible_advances_under_cadence_gt_1_without_durable"
    - "crates/core/tests/durable_frontier_waits_append_gate.rs :: append_with_visible_gate_returns_after_publish"
  replaces_when: >
    Default DurabilityGate becomes non-None for any read path, OR
    sync_every_n_events default changes to 1. The observation remains
    current-fact for default-configured stores without explicit gates while
    neither condition holds.
  artifacts:
    - ART-FRONTIER-WATERMARK-STATE
    - ART-FRONTIER-SEMANTICS-TESTS
- id: OBS-DURABLE-HLC-INCLUDES-OS-PRESERVED-DATA
  status: current-fact
  statement: >
    On recovery, durable_hlc is derived from max_recovered_hlc and therefore
    classifies any physically-on-disk event as durable, including events whose
    fsync was never deliberately called by batpak but which the OS preserved via
    journal commit, periodic flush, or unmount-time sync. The substrate has no
    fsync-history marker that would distinguish 'batpak deliberately fsynced'
    from 'OS preserved.' This is consistent with Meaning-2 durable_hlc
    semantics; under Meaning-1 semantics it would constitute a substrate gap.
  evidence:
    - "crates/core/tests/chaos/scenarios/single_append_written.rs :: durable_frontier_covers_recovered_state_after_device_failure_cadence_1000"
  replaces_when: >
    Substrate adopts a fsync-history watermark marker (no current plan;
    Meaning-2 is the contract).
  artifacts:
    - ART-CHAOS-HARNESS
    - ART-FRONTIER-WATERMARK-STATE
