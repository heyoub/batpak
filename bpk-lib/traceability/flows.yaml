- id: FLOW-APPEND
  summary: Root-cause append goes through store append path, writer commit protocol, and persistence.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-WRITER
    - ART-STORE-SEGMENT
    - ART-STORE-INTEGRATION
    - ART-OBSERVABILITY-TESTS
- id: FLOW-SYNCBAT-CHECKOUT
  summary: A caller builds a syncbat Core from registered descriptors and handlers, submits a CheckoutFrame by stable operation name, runs the resolved handler synchronously with a Ctx over the descriptor, and optionally records exactly one completed or failed receipt through the configured ReceiptSink.
  artifacts:
    - ART-SYNCBAT-SOURCE
    - ART-SYNCBAT-TESTS
    - ART-SYNCBAT-WIRE-GOLDENS
    - ART-ADR-SYNCBAT-CONTRACT
- id: FLOW-SYNCBAT-REGISTER-CATALOG
  summary: StoreRegisterCatalog validates operation descriptors, appends typed lifecycle rows to one batpak coordinate, and rebuild_register_from_store folds those rows in store sequence order into the active runtime Register while rejecting malformed rows and invalid lifecycle transitions.
  artifacts:
    - ART-SYNCBAT-SOURCE
    - ART-SYNCBAT-TESTS
    - ART-SYNCBAT-WIRE-GOLDENS
    - ART-ADR-SYNCBAT-CONTRACT
- id: FLOW-NETBAT-CALL
  summary: netbat decodes a bounded NETBAT/1 CALL line or legacy CALL line, revalidates the RequestFrame, dispatches through syncbat Core::checkout_frame, enforces output limits, and writes a stable OK or ERR response without taking ownership of runtime or durability semantics.
  artifacts:
    - ART-NETBAT-SOURCE
    - ART-NETBAT-TESTS
    - ART-NETBAT-WIRE-GOLDENS
    - ART-ADR-NETBAT-CONTRACT
- id: FLOW-REFBAT-EVENT-QUERY
  summary: event.query accepts bounded domain-neutral filters, validates kind and coordinate axes, pages visible Store index entries in global_sequence order through Store::query_entries_after, and returns metadata-only summaries; callers fetch full payloads with event.get and decode domain envelopes above batpak.
  artifacts:
    - ART-STORE-QUERY-TRAVERSAL
    - ART-STORE-QUERY-TRAVERSAL-TESTS
    - ART-DX-DOCS
- id: FLOW-REFBAT-EVIDENCE-OPS
  summary: evidence.* ops adapt Store evidence reports to NETBAT/1 with canonical report_hex + body_hash identity and bounded Region selectors.
  artifacts:
    - ART-STORE-EVIDENCE-REPORTS
    - ART-BPK-TS-MANIFEST
    - ART-BPK-TS-CODEGEN
- id: FLOW-APPEND-OPTIONS
  summary: Append with CAS/idempotency/correlation options, receipt extensions, and optional lane/depth position hints enforces guards before commit while leaving HLC wall/counter and sequence under writer control; committed extension bytes are copied into append and denial receipts before signing, persisted in .fbat frame metadata, and reconstructed for idempotency replay after cold start.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-PROPERTIES
    - ART-DAG-POSITION-HINT-TESTS
    - ART-ADR-POSITION-HINTS
- id: FLOW-RECEIPT-EXTENSION-CARGO
  summary: Unknown receipt extensions are substrate cargo. batpak preserves extension bytes byte-for-byte when returning, signing, replaying, or reconstructing the same committed receipt; current checkpoint and mmap artifacts carry those maps directly, older artifacts hydrate from .fbat frames, pcp.* keys are handled exactly like application keys, and semantic interpretation is left to extension-aware code outside batpak-core.
  artifacts:
    - ART-STORE-APPEND
    - ART-STORE-SEGMENT
    - ART-STORE-CHECKPOINT
    - ART-STORE-MMAP
    - ART-STORE-INTEGRATION
- id: FLOW-APPEND-REACTION
  summary: Causal follow-up appends preserve correlation and causation IDs while emitting distinct telemetry.
  artifacts:
    - ART-STORE-MOD
    - ART-OBSERVABILITY-TESTS
- id: FLOW-SUBMIT
  summary: Nonblocking submit returns tickets immediately, while try_submit adds Outcome-based retry and cancellation signaling from mailbox pressure and public fence state.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-CONFIG
    - ART-CONTROL-PLANE-TESTS
    - ART-ADR-CONTROL-PLANE
- id: FLOW-WALK-ANCESTORS
  summary: Ancestor traversal follows hash links when available and falls back to deterministic clock order otherwise.
  artifacts:
    - ART-STORE-ANCESTRY
    - ART-STORE-ADVANCED
- id: FLOW-PROJECT
  summary: Project checks cache capability, optionally prefetches, validates freshness, and replays on miss through the sealed replay-lane contract (`JsonValueInput` default lane vs `RawMsgpackInput` raw lane).
  artifacts:
    - ART-PROJECTION
    - ART-STORE-PROJECTION
    - ART-EVENT-SOURCING
    - ART-PROJECTION-TESTS
    - ART-OBSERVABILITY-TESTS
- id: FLOW-REACT
  summary: Reactive loop subscribes, loads source events, emits derived reactions, and appends them causally.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-ADVANCED
- id: FLOW-DELIVERY-AT-LEAST-ONCE-WITNESS
  summary: cursor_worker mints an AtLeastOnce witness from config.checkpoint_id at worker startup, passes Option<&AtLeastOnce> to each cursor or typed-reactor handler batch, and downstream code composes ObservedOnce only when it receives Some plus its own IdempotencyKey.
  artifacts:
    - ART-DELIVERY-WITNESS-SURFACE
    - ART-DELIVERY-WITNESS-TESTS
    - ART-ADR-AT-LEAST-ONCE-WITNESS
    - ART-DX-DOCS
    - ART-EXAMPLES
- id: FLOW-SYNC
  summary: Explicit sync hands control to the writer and returns only after the writer acknowledges durability work.
  artifacts:
    - ART-STORE-PLATFORM
    - ART-STORE-LIFECYCLE
    - ART-OBSERVABILITY-TESTS
- id: FLOW-STORE-PLATFORM-CONTACT
  summary: Store platform contact routes target-sensitive fs, sync, lock, clock, mmap, evidence, admission, profile, and reverify mechanics through the private store::platform room while store/cold-start/frontier code retains semantic ownership of guarantees.
  artifacts:
    - ART-STORE-PLATFORM
    - ART-STORE-CONFIG
    - ART-STORE-ERROR
    - ART-STORE-PLATFORM-FIXTURES
    - ART-ADR-STORE-PLATFORM
    - ART-XTASK
    - ART-BUILD-RS
- id: FLOW-SNAPSHOT
  summary: Snapshot syncs first, then copies the sealed on-disk segment set plus hidden-visibility metadata into a destination directory.
  artifacts:
    - ART-STORE-LIFECYCLE
    - ART-OBSERVABILITY-TESTS
    - ART-REPLAY-TESTS
- id: FLOW-COMPACT
  summary: Compaction syncs, merges sealed segments, rebuilds the index, and preserves observable store truth.
  artifacts:
    - ART-STORE-LIFECYCLE
    - ART-REPLAY-TESTS
    - ART-ADR-COMPACTION
- id: FLOW-WATCH-PROJECTION
  summary: Watch-projection subscribes to entity events and re-projects on each notification, returning updated state to the caller.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-PROJECTION
    - ART-UNIFIED-TESTS
- id: FLOW-BATCH-APPEND
  summary: Atomic batch append validates limits, preflights idempotency, normalizes fresh or prepared items through the same staging packets, writes BEGIN marker, event frames, COMMIT marker, fsyncs, then atomically publishes to the in-memory index.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-APPEND
    - ART-STORE-WRITER
    - ART-BATCH-TESTS
    - ART-BATCH-STAGING-REGRESSION
    - ART-STORE-SCAN
- id: FLOW-BATCH-RECOVERY
  summary: Cold-start segment scan stages batch frames until COMMIT marker confirmed; incomplete batches (missing COMMIT) are discarded. State persists across segment boundaries.
  artifacts:
    - ART-STORE-SCAN
    - ART-BATCH-TESTS
- id: FLOW-FAULT-INJECT
  summary: Fault injection hooks at writer critical points allow chaos testing of crash/error scenarios under the dangerous-test-hooks feature gate.
  artifacts:
    - ART-STORE-FAULT
    - ART-BATCH-TESTS
- id: FLOW-CLOSE
  summary: Close routes shutdown through the writer so outstanding work drains before the store exits.
  artifacts:
    - ART-STORE-LIFECYCLE
    - ART-OBSERVABILITY-TESTS
- id: FLOW-VISIBILITY-FENCE
  summary: Visibility fences stage durable writes behind a single active token, publish them atomically on commit, and keep cancelled ranges hidden across restart and snapshot flows.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-INDEX
    - ART-STORE-WRITER
    - ART-STORE-HIDDEN-RANGES
    - ART-CONTROL-PLANE-TESTS
    - ART-ADR-CONTROL-PLANE
- id: FLOW-OPEN-FASTPATH
  summary: Open prefers verified mmap index restore, then checkpoint restore, then segment replay, reapplies persisted hidden fence ranges regardless of which cold-start path wins, and emits a structured reopen receipt through diagnostics/logging plus a mutable-open lifecycle event.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-REBUILD
    - ART-STORE-SCAN
    - ART-STORE-CHECKPOINT
    - ART-STORE-MMAP
    - ART-ADR0009-COLD-START-FIXTURES
    - ART-STORE-PLATFORM
    - ART-STORE-HIDDEN-RANGES
    - ART-CONTROL-PLANE-TESTS
    - ART-ADR-CONTROL-PLANE
- id: FLOW-FRONTIER-OBSERVE
  summary: Store::frontier() returns a FrontierView composed under one watermark mutex acquisition; diagnostics() consumes the same path so external observers and operators see the identical six-watermark snapshot with no torn intermediate states. The current cadence>1 single-append visible-before-durable gap is tracked as OBS-CADENCE-GT-1-VISIBLE-EXCEEDS-DURABLE, not as an invariant.
  artifacts:
    - ART-FRONTIER-WATERMARK-STATE
    - ART-FRONTIER-TYPES
    - ART-STORE-MOD
    - ART-FRONTIER-SEMANTICS-TESTS
- id: FLOW-FRONTIER-BOOTSTRAP
  summary: Store::open computes open_hlc from max_recovered_hlc, last_close_hlc, and a wall-time floor; emits SYSTEM_OPEN_COMPLETED with that HLC; resets all six watermarks to open_hlc except applied which seeds at open_hlc as well to preserve the registry-empty invariant.
  artifacts:
    - ART-FRONTIER-BOOTSTRAP
    - ART-FRONTIER-WATERMARK-STATE
    - ART-FRONTIER-SEMANTICS-TESTS
- id: FLOW-FRONTIER-CHAOS-RECOVERY
  summary: Writer-thread panics at fault-injection seams surface to callers as StoreError::WriterCrashed without poisoning the parking_lot watermark mutex; reopen recovers all events whose commit completed prior to the panic and emits a strictly-greater open_hlc.
  artifacts:
    - ART-FRONTIER-CHAOS-TESTS
    - ART-FRONTIER-BOOTSTRAP
    - ART-FRONTIER-FAULT-INJECTION
- id: FLOW-CHAOS-TORN-TAIL
  summary: The dm-flakey chaos scenarios open a store on a mapped ext4 device, append and fsync lower-bound single or batch events, append non-fsynced single or batch events, flip the mapper to an error target, drop the store and device, recreate a fresh mapper on the same backing file, reopen the store, and assert that durable_hlc covers every recovered event and is monotonic across the crash boundary. Batch torn-tail scenarios additionally stress mid-commit writeback, mixed single+batch durability floors, and caller-visible IO failure after device failure. These tests do not assert which specific in-flight events survive; that depends on OS-level write-back behavior outside batpak's contract.
  artifacts:
    - ART-CHAOS-HARNESS
    - ART-CHAOS-DM-FLAKEY
    - ART-CHAOS-BATCH-COMMIT-WRITTEN
    - ART-FRONTIER-CHAOS-TESTS
- id: FLOW-FRONTIER-WAIT-DURABLE
  summary: A caller invokes wait_for_durable with a target HLC and mandatory timeout; the store waits on the watermark condvar, watermark advances notify all waiters, each wake rechecks writer-crash poison and durable_hlc >= target under the watermark mutex, and the call returns Ok, WaitTimeout, or WriterCrashed.
  artifacts:
    - ART-FRONTIER-WAIT-API
    - ART-FRONTIER-WAIT-TESTS
    - ART-ADR-DURABILITY-GATING
- id: FLOW-FRONTIER-WAIT-APPLIED
  summary: A caller invokes wait_for_applied with a target HLC and mandatory timeout; the store waits on the shared watermark condvar, projection registry advances recompute applied_hlc as the minimum across registered projections and notify waiters under the watermark mutex, each wake rechecks writer-crash poison and applied_hlc >= target, and the call returns Ok, WaitTimeout, or WriterCrashed.
  artifacts:
    - ART-FRONTIER-WAIT-API
    - ART-FRONTIER-PROJECTION-REGISTRY
    - ART-FRONTIER-WAIT-TESTS
    - ART-ADR-DURABILITY-GATING
- id: FLOW-FRONTIER-WAIT-VISIBLE
  summary: A caller invokes wait_for_visible with a target HLC and mandatory timeout; the store waits on the shared watermark condvar, publish advances visible_hlc and notifies waiters under the watermark mutex, each wake rechecks writer-crash poison and visible_hlc >= target, and the call returns Ok, WaitTimeout, or WriterCrashed.
  artifacts:
    - ART-FRONTIER-WAIT-API
    - ART-FRONTIER-WAIT-TESTS
    - ART-ADR-DURABILITY-GATING
- id: FLOW-FRONTIER-APPEND-GATE
  summary: A caller invokes append_with_options or append_batch_with_options with AppendOptions::gate set; the writer commits the event or batch, the blocking append path derives the committed HLC from the receipt/index entry, calls wait_for_durable, wait_for_applied, or wait_for_visible according to DurabilityGate.kind, and returns Ok(receipt) or Ok(receipts) only after the requested watermark crosses the target, otherwise surfacing WaitTimeout or WriterCrashed while leaving the committed event queryable.
  artifacts:
    - ART-FRONTIER-APPEND-GATE
    - ART-FRONTIER-WAIT-API
    - ART-FRONTIER-WAIT-TESTS
    - ART-ADR-DURABILITY-GATING
- id: FLOW-DX-SUBSTRATE-TO-DOWNSTREAM-SURFACE
  summary: Downstream product and agent frameworks may translate BatPAK truth into living work artifacts, role-specific surfaces, context packets, or delegated action loops, but BatPAK exposes only substrate-neutral events, receipts, regions, query/get/walk traversal, projection mechanics, evidence, and opaque extension cargo.
  artifacts:
    - ART-DX-PRODUCT-DOCTRINE-AUDIT
    - ART-DX-DOCS
    - ART-STORE-QUERY-TRAVERSAL
