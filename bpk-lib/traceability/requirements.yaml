- id: REQ-ENV-HERMETIC
  summary: The repository must define a portable, reproducible development and CI environment contract.
  artifacts:
    - ART-DEVCONTAINER
    - ART-GITATTRIBUTES
    - ART-DOCTOR
- id: REQ-GATES-EXECUTABLE
  summary: All declared integrity gates must be runnable and required in local and CI workflows.
  artifacts:
    - ART-CI
    - ART-JUST
    - ART-XTASK
    - ART-DENY-CONFIG
- id: REQ-TRACE-BIDIR
  summary: Important requirements, invariants, flows, and proving artifacts must link bidirectionally.
  artifacts:
    - ART-TRACEABILITY
    - ART-RELEASE-HISTORY
    - ART-ADR-SYNC
    - ART-ADR-COMPACTION
    - ART-ADR-RESTORE-PLANNER
    - ART-ADR-POSITION-HINTS
- id: REQ-STORE-HONESTY
  summary: The store runtime must expose only production-valid APIs by default and make privileged paths explicit.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-DANGEROUS-TEST-HOOKS
    - ART-STORE-ADVANCED
- id: REQ-CACHE-CAPABILITY
  summary: Cache behavior must express capabilities explicitly rather than hiding behind silent default no-ops.
  artifacts:
    - ART-PROJECTION
    - ART-PROJECTION-TESTS
- id: REQ-OBSERVABILITY
  summary: Named flows must emit enough telemetry and proofs for post-facto reconstruction.
  artifacts:
    - ART-OBSERVABILITY-TESTS
    - ART-STORE-MOD
- id: REQ-REPLAY-DETERMINISM
  summary: Snapshot and cold-start rebuilds must preserve observable state and projection outputs.
  artifacts:
    - ART-REPLAY-TESTS
    - ART-STORE-INTEGRATION
    - ART-STORE-REBUILD
- id: REQ-STRUCTURAL-DETECTORS
  summary: The codebase must run parser-backed detectors for structural drift, stale references, and public-surface honesty.
  artifacts:
    - ART-STRUCTURAL-CHECK
    - ART-PUB-ALLOWLIST
    - ART-PUBLIC-API-BASELINE
- id: REQ-SYNCBAT-RUNTIME-CONTRACT
  summary: syncbat must remain the sync-first runtime layer that validates operation registration, dispatches handlers by stable operation name, emits honest runtime receipts, and persists durable catalog rows through batpak public APIs.
  artifacts:
    - ART-SYNCBAT-SOURCE
    - ART-SYNCBAT-TESTS
    - ART-SYNCBAT-WIRE-GOLDENS
    - ART-ADR-SYNCBAT-CONTRACT
    - ART-PUBLIC-API-BASELINE
- id: REQ-NETBAT-BOUNDARY-CONTRACT
  summary: netbat must remain the bounded exposure layer over syncbat, owning line-protocol validation, stable request/response encoding, and error-code mapping without taking ownership of runtime, receipt, or durability semantics.
  artifacts:
    - ART-NETBAT-SOURCE
    - ART-NETBAT-TESTS
    - ART-NETBAT-WIRE-GOLDENS
    - ART-ADR-NETBAT-CONTRACT
    - ART-PUBLIC-API-BASELINE
- id: REQ-BIDIRECTIONAL-SUBSTRATE-LANE
  summary: Non-Rust terminals that can commit substrate events must also expose bounded, domain-neutral traversal so external replay can be reconstructed from substrate truth without sidecar authority.
  artifacts:
    - ART-HBAT-SOURCE
    - ART-HBAT-TESTS
    - ART-HBAT-MANIFEST-EXPORT
    - ART-STORE-QUERY-TRAVERSAL
    - ART-STORE-QUERY-TRAVERSAL-TESTS
    - ART-DX-DOCS
- id: REQ-RELEASE-FAMILY-PUBLIC
  summary: The 0.7.6 correction cut must ship every publishable batpak-family crate as one public release train with aligned internal version pins, package-local entrypoints, traceability artifacts, and explicit release proof gates.
  artifacts:
    - ART-CARGO
    - ART-PACKAGE-READMES
    - ART-RELEASE-HISTORY
    - ART-PUBLIC-API-BASELINE
    - ART-SYNCBAT-WIRE-GOLDENS
    - ART-NETBAT-WIRE-GOLDENS
    - ART-ADR-RELEASE-PROOF-POSTURE
- id: REQ-DX-ROOT-FIRST
  summary: The repository must present a root-first, beginner-friendly command and documentation surface without hiding the maintainer lane.
  artifacts:
    - ART-XTASK
    - ART-DX-DOCS
- id: REQ-CONTROL-PLANE-ADDITIVE
  summary: Advanced store control features must remain additive so the blocking append/query onboarding surface stays source-compatible.
  artifacts:
    - ART-STORE-MOD
    - ART-STORE-CONFIG
    - ART-CONTROL-PLANE-TESTS
    - ART-ADR-CONTROL-PLANE
- id: REQ-DX-SUBSTRATE-PRODUCT-FIREWALL
  summary: Product and agent-framework doctrine may guide naming and documentation, but BatPAK public surfaces must remain substrate-neutral and must not own Downstream, External-Profile, workflow-builder, role-surface, or living-work-artifact semantics.
  artifacts:
    - ART-DX-PRODUCT-DOCTRINE-AUDIT
    - ART-DX-DOCS
    - ART-HBAT-SOURCE
    - ART-STORE-QUERY-TRAVERSAL
