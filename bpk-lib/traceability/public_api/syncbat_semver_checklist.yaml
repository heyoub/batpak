# syncbat semver-check classification (baseline: crates.io 0.7.0 train posture).
# syncbat is not published on crates.io yet; `cargo semver-checks` registry lookup
# fails. Entries classify CHANGELOG-documented breaks vs the pre-0.8.0 transitional
# surface. hbat is reference-host only (`publish = false`); out of scope for this cut.
package: syncbat
baseline_version: 0.7.0
current_version: 0.8.1
witness: target/semver-public-api/semver-checks.txt
summary: "syncbat not on crates.io; 5 intentional breaks classified from CHANGELOG vs pre-0.8.0 transitional surface."

public_api_baseline_removals: []
public_api_baseline_additions: []
accidental_leaks_hidden: []

entries:
  - rule: pub_type_alias_missing
    item: syncbat::Cx
    disposition: intentional_0_8
    changelog: CHANGELOG.md
    replacement: syncbat::Ctx
    note: Transitional handler-context alias removed; handler signatures use Ctx.

  - rule: pub_type_alias_missing
    item: syncbat::InvokeResult
    disposition: intentional_0_8
    changelog: CHANGELOG.md
    replacement: syncbat::CheckoutResult
    note: Transitional invoke/checkout result alias removed.

  - rule: pub_type_alias_missing
    item: syncbat::RegisterOperationPutV1
    disposition: intentional_0_8
    changelog: CHANGELOG.md
    replacement: syncbat::RegisterOperationRowV1
    note: Transitional durable-catalog row alias removed.

  - rule: struct_pub_field_missing
    item: syncbat::receipt::BatpakReceiptFields::disk_pos
    disposition: intentional_0_8
    changelog: CHANGELOG.md
    note: syncbat receipt metadata no longer exposes batpak index internals; query batpak by event_id for diagnostics.

  - rule: enum_struct_variant_field_added
    item: syncbat::RuntimeError::ReceiptSink::caused_by_handler
    disposition: intentional_0_8
    changelog: CHANGELOG.md
    note: Receipt-sink failures after handler failure preserve handler class/message via ReceiptSinkHandlerCause.

  - rule: no_change
    item: syncbat receipt extension surface (SyncbatReceiptNamespace, receipt_extension_*)
    disposition: no_change
    changelog: CHANGELOG.md
    note: Intentional public extension namespace; covered by crates/syncbat/tests/receipt_namespace.rs.
