name: Integrity CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"
    - cron: "30 7 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # tests/common/proptest.rs treats this as a floor, not an exact override:
  # small fast tests can be lifted upward in CI without silently capping
  # deeper fuzz/property surfaces that already ask for more.
  PROPTEST_CASES: 256
  # tests/chaos_testing.rs now defaults to 500 in source. CI sets the same
  # value explicitly so the canonical container lane, local preflight, and
  # manual deep overrides all agree on the intended baseline.
  CHAOS_ITERATIONS: 500

jobs:
  rust-changed:
    name: Detect Rust-relevant changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.detect.outputs.rust }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base" HEAD | grep -qE '^(bpk-lib/|\.devcontainer/|\.github/workflows/ci\.yml|bpk-lib/\.cargo/)'; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi

  ci-fast-linux:
    name: CI fast (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-fast
      - uses: ./.github/actions/setup-devcontainer
      - name: Fast PR signal
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'just ci-fast'

  verify-linux:
    name: Verify (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    needs: [ci-fast-linux]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: verify
      - uses: ./.github/actions/setup-devcontainer
      - name: Canonical preflight proof bundle
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'just verify'

  ci-windows:
    name: CI Windows surface (native)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.132
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-windows
      - name: Native Windows surface lane
        working-directory: bpk-lib
        run: cargo xtask ci-windows-surface

  feature-isolation:
    runs-on: ubuntu-latest
    needs: [ci-fast-linux, verify-linux, rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "--features dangerous-test-hooks"
          - "--no-default-features"
          - "--no-default-features --features dangerous-test-hooks"
          - "--all-features"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-devcontainer
      - name: Feature-isolation test matrix
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh "cargo test ${{ matrix.features }}"

  smoke-consumers:
    name: Smoke (quickstart, packaged consumer, template)
    runs-on: ubuntu-latest
    needs: [verify-linux]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-devcontainer
      - name: Run onboarding smoke checks
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: |
          bash ./scripts/run-in-devcontainer.sh '
            cargo xtask quickstart &&
            cargo xtask consumer-smoke &&
            cargo xtask templates
          '

  ts-parity:
    # BatPAK TypeScript SDK Phase 0 wire-parity gate.
    #
    # Generates the manifest, builds + tests every TS package, boots `hbat`
    # on an ephemeral loopback port, parses the structured `HBAT_READY` line
    # to discover the port, runs the live `heartbeat-spike` example, and
    # finally verifies the codegen is deterministic by deleting the
    # generated tree and rebuilding.
    name: TS Parity (manifest + canonical + heartbeat-spike)
    runs-on: ubuntu-latest
    needs: [verify-linux]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@v2
      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: bpk-ts/pnpm-lock.yaml
      - name: Cargo build (hbat + xtask)
        working-directory: bpk-lib
        run: |
          cargo build -p hbat
          cargo build -p xtask
      - name: Export BatPAK TS manifest
        working-directory: bpk-lib
        run: cargo run -p xtask -- export-ts-manifest --out ../bpk-ts/batpak.manifest.json
      - name: Install TS deps
        working-directory: bpk-ts
        run: pnpm install --frozen-lockfile
      - name: TS build (codegen runs as part of build)
        working-directory: bpk-ts
        run: |
          pnpm -w build
          pnpm --filter @batpak/codegen run generate
      - name: TS parity tests
        working-directory: bpk-ts
        run: pnpm -w test
      - name: Live heartbeat roundtrip
        working-directory: bpk-ts
        run: |
          set -uo pipefail
          STORE=$(mktemp -d)
          HBAT_PID=""
          cleanup() {
            if [ -n "$HBAT_PID" ]; then
              kill "$HBAT_PID" 2>/dev/null || true
              wait "$HBAT_PID" 2>/dev/null || true
            fi
            rm -rf "$STORE"
          }
          trap cleanup EXIT
          ../bpk-lib/target/debug/hbat serve --store "$STORE" --tcp 127.0.0.1:0 --print-port > /tmp/hbat-ready.txt 2> /tmp/hbat-err.txt &
          HBAT_PID=$!
          for _ in $(seq 1 50); do
            if [ -s /tmp/hbat-ready.txt ]; then break; fi
            sleep 0.1
          done
          if [ ! -s /tmp/hbat-ready.txt ]; then
            echo "hbat did not emit HBAT_READY within 5s"
            cat /tmp/hbat-err.txt
            exit 1
          fi
          PORT=$(node -e 'const l=require("fs").readFileSync("/tmp/hbat-ready.txt","utf-8").trim();process.stdout.write(String(JSON.parse(l.replace(/^HBAT_READY /,"")).port))')
          echo "hbat: $(cat /tmp/hbat-ready.txt)"
          node examples/heartbeat-spike/dist/index.js --port "$PORT"
      - name: Determinism — rm -rf generated, rebuild, diff
        working-directory: bpk-ts
        run: |
          rm -rf packages/generated/src packages/generated/dist
          pnpm -w build || true
          pnpm --filter @batpak/codegen run generate
          pnpm -w build
          STATUS=$(git status --porcelain packages/generated)
          if [ -n "$STATUS" ]; then
            echo "::error title=Codegen non-deterministic::see step output for diff"
            echo "=== git status --porcelain packages/generated ==="
            echo "$STATUS"
            echo "=== git diff --no-color packages/generated ==="
            git --no-pager diff --no-color packages/generated
            echo "=== git diff -- packages/generated/src/manifest.ts ==="
            git --no-pager diff --no-color -- packages/generated/src/manifest.ts | head -200
            echo "=== md5sums of generated/src ==="
            find packages/generated/src -type f -exec md5sum {} \;
            echo "=== first 20 lines of each generated/src file ==="
            for f in packages/generated/src/*.ts; do
              echo "--- $f ---"
              head -20 "$f"
            done
            exit 1
          fi
          echo "determinism gate: ok"
      - name: Upload generated artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ts-parity-generated-debug
          path: |
            bpk-ts/packages/generated/
            bpk-ts/batpak.manifest.json
          if-no-files-found: warn
          retention-days: 7

  mutants-smoke:
    name: Mutation smoke (${{ matrix.seam }})
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') &&
      needs.rust-changed.outputs.rust == 'true'
    needs: [ci-fast-linux, rust-changed]
    strategy:
      fail-fast: false
      matrix:
        seam:
          - writer-commit
          - cursor-delivery
          - projection-flow
          - segment-scan
          - hash-chain-replay
          - frontier-wait-durable
          - frontier-append-gate
          - event-payload-registry-validator
          - platform-backend
          - testing-ledger-structural-lint
          - syncbat-runtime-dispatch
          - syncbat-register-catalog
          - netbat-boundary-protocol
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: mutants-smoke-${{ matrix.seam }}
      - uses: ./.github/actions/setup-devcontainer
      - name: Mutation smoke (critical seam shard)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants smoke --seam ${{ matrix.seam }}'

  mutants-smoke-repo-wide:
    name: Mutation smoke (repo-wide ratchet)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') &&
      needs.rust-changed.outputs.rust == 'true'
    needs: [ci-fast-linux, rust-changed]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: mutants-smoke-repo-wide
      - uses: ./.github/actions/setup-devcontainer
      - name: Mutation smoke (repo-wide shard 1/48)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants smoke --repo-wide-only'

  loom-schedule-proof:
    name: Loom schedule proof
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-loom'))
    needs: [ci-fast-linux, verify-linux]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-devcontainer
      - name: Bounded loom schedule proofs
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask loom'

  mutants-full:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 7 * * 1'
    strategy:
      fail-fast: false
      matrix:
        surface:
          - all-features
          - no-default-features
        shard:
          - 1/12
          - 2/12
          - 3/12
          - 4/12
          - 5/12
          - 6/12
          - 7/12
          - 8/12
          - 9/12
          - 10/12
          - 11/12
          - 12/12
    name: Mutation full (${{ matrix.surface }} shard ${{ matrix.shard }})
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: mutants-full-${{ matrix.surface }}-${{ matrix.shard }}
      - uses: ./.github/actions/setup-devcontainer
      - name: Full mutation shard
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants full --surface ${{ matrix.surface }} --shard ${{ matrix.shard }}'

  chaos-nightly:
    name: Chaos nightly (dm-flakey)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule' && github.event.schedule == '30 7 * * *') ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-chaos'))
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install block-device chaos tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dmsetup e2fsprogs util-linux
      - name: dm-flakey harness
        working-directory: bpk-lib
        env:
          BATPAK_RUN_CHAOS: "1"
        run: cargo test --features dangerous-test-hooks --test chaos -- --test-threads=1

  docs:
    runs-on: ubuntu-latest
    needs: [verify-linux]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@v2
      - uses: ./.github/actions/setup-devcontainer
      - name: Build root docs site + rustdoc
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask docs'
      - uses: actions/upload-pages-artifact@v5
        with:
          path: bpk-lib/target/site
      - id: deploy
        # `continue-on-error: true` because the deploy step will hard-fail
        # with `404 Not Found` until GitHub Pages is enabled in repository
        # Settings → Pages (deployment source: "GitHub Actions"). The build
        # and upload steps above are the meaningful gates — they catch
        # rustdoc and root-doc site breakage. The deploy itself is the LAST mile and
        # should not block CI on a one-time admin setup that the codebase
        # cannot fix from inside Rust source. Once Pages is enabled, this
        # step succeeds silently and `continue-on-error` becomes a no-op.
        # See: https://github.com/TheFreeBatteryFactory/batpak/settings/pages
        continue-on-error: true
        uses: actions/deploy-pages@v5
