name: Integrity CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROPTEST_CASES: 256
  # tests/chaos_testing.rs reads this; default fallback in the test source
  # is 10, which is too few to expose real concurrency races. The inline
  # comment in the test file recommends 5000 for meaningful coverage; 500
  # is the CI compromise (~50x the default, enough to find races but
  # bounded enough to keep CI under the 20-minute Linux job budget).
  CHAOS_ITERATIONS: 500

jobs:
  integrity-linux-container:
    name: Integrity (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-devcontainer
      - name: Canonical container integrity gates
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: |
          bash ./scripts/run-in-devcontainer.sh 'cargo xtask ci'

  integrity-windows-native:
    name: Integrity (windows-native)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt,llvm-tools-preview
      # Tool version pins MUST stay in lock-step with `.devcontainer/Dockerfile`
      # and `cargo xtask setup`. Drift is caught by `check_ci_parity` in
      # `tools/integrity/src/main.rs` (run via `cargo xtask structural`).
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.132
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19.0
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.22.1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.5
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants@27.0.0
      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.4.52
      - uses: Swatinem/rust-cache@v2
      - name: Integrity
        run: cargo xtask ci

  feature-isolation:
    runs-on: ubuntu-latest
    needs: [integrity-linux-container, integrity-windows-native]
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "--features blake3"
          - "--features dangerous-test-hooks"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-devcontainer
      - name: Feature-isolation test matrix
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh "cargo test ${{ matrix.features }}"

  coverage:
    runs-on: ubuntu-latest
    needs: [integrity-linux-container, integrity-windows-native]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-devcontainer
      - name: Coverage threshold check
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: |
          bash ./scripts/run-in-devcontainer.sh 'cargo xtask cover --ci --threshold 80'

  smoke-consumers:
    name: Smoke (quickstart, packaged consumer, template)
    runs-on: ubuntu-latest
    needs: [integrity-linux-container]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-devcontainer
      - name: Run onboarding smoke checks
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: |
          bash ./scripts/run-in-devcontainer.sh '
            cargo xtask quickstart &&
            cargo xtask consumer-smoke &&
            cargo run --manifest-path templates/minimal-app/Cargo.toml
          '

  mutants:
    # Mutation testing smoke run — fast subset (1/12 shard) that completes
    # in under ~5 minutes. Triggered on every push and pull_request to
    # surface tests that pass-by-accident (mutations that survive without
    # being caught by any test). Also runs on manual workflow_dispatch.
    #
    # HARD GATE: mutation score must be >= 20% (caught) or the job fails.
    # cargo-mutants 27.0.0 has no built-in threshold flag; the gate is
    # implemented by parsing caught.txt / missed.txt in mutants() in
    # tools/xtask/src/main.rs after each cargo-mutants invocation.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [integrity-linux-container, integrity-windows-native]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-devcontainer
      - name: Mutation smoke (all features, shard 1/12)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants smoke'

  mutants-full:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        surface:
          - name: all-features
            command: >-
              cargo mutants --file "src/store/*.rs" --file src/wire.rs --file "src/guard/*.rs" --file "src/pipeline/*.rs" --exclude src/store/ancestors_clock.rs --all-features --test-tool cargo
          - name: no-default-features
            command: >-
              cargo mutants --file "src/store/*.rs" --exclude src/store/ancestors_hash.rs --no-default-features --test-tool cargo
        shard:
          - 1/12
          - 2/12
          - 3/12
          - 4/12
          - 5/12
          - 6/12
          - 7/12
          - 8/12
          - 9/12
          - 10/12
          - 11/12
          - 12/12
    name: Mutation full (${{ matrix.surface.name }} shard ${{ matrix.shard }})
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-devcontainer
      - name: Full mutation shard
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh '${{ matrix.surface.command }} --shard ${{ matrix.shard }}'

  docs:
    runs-on: ubuntu-latest
    needs: [integrity-linux-container, integrity-windows-native]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-devcontainer
      - name: Build rustdoc + scrub upload-pages-artifact gotchas
        # Two things in the rustdoc output break `actions/upload-pages-artifact@v3`:
        #   1. `macro.NAME!.html` redirect files — the `!` in the filename
        #      is rejected by the tar packing the action uses.
        #   2. `./api/.lock` — a rustdoc-internal lock file with restricted
        #      permissions; the GH runner user can't read it.
        # Both files are owned by the in-container user (root) because
        # rustdoc runs inside the canonical devcontainer. Delete them
        # INSIDE the container so the host runner doesn't hit
        # permission-denied. Both deletes are best-effort (`|| true`)
        # so a missing file doesn't fail the step.
        run: |
          bash ./scripts/run-in-devcontainer.sh '
            cargo xtask docs &&
            find target/site -name "*!*.html" -type f -delete &&
            find target/site -name ".lock" -type f -delete &&
            chmod -R u+rX target/site
          '
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/site
      - id: deploy
        # `continue-on-error: true` because the deploy step will hard-fail
        # with `404 Not Found` until GitHub Pages is enabled in repository
        # Settings → Pages (deployment source: "GitHub Actions"). The build
        # and upload steps above are the meaningful gates — they catch
        # rustdoc/mdbook breakage. The deploy itself is the LAST mile and
        # should not block CI on a one-time admin setup that the codebase
        # cannot fix from inside Rust source. Once Pages is enabled, this
        # step succeeds silently and `continue-on-error` becomes a no-op.
        # See: https://github.com/TheFreeBatteryFactory/batpak/settings/pages
        continue-on-error: true
        uses: actions/deploy-pages@v4
