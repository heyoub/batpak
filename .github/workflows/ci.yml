name: Integrity CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    # Default manual runs are intentionally cheap. Choose an explicit proof
    # profile when you want to spend hosted CI minutes on deeper evidence.
    inputs:
      proof:
        description: "Proof profile to run"
        required: true
        default: fast
        type: choice
        options:
          - fast
          - verify
          - windows
          - mutants
          - loom
          - chaos
          - heavy
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # tests/common/proptest.rs treats this as a floor, not an exact override:
  # small fast tests can be lifted upward in CI without silently capping
  # deeper fuzz/property surfaces that already ask for more.
  PROPTEST_CASES: 256
  # tests/chaos_testing.rs now defaults to 500 in source. CI sets the same
  # value explicitly so the canonical container lane, local preflight, and
  # manual deep overrides all agree on the intended baseline.
  CHAOS_ITERATIONS: 500

jobs:
  # Cost posture: pull requests run the fast devcontainer lane by default.
  # Expensive proof jobs are label-gated (`run-heavy-ci`, `run-mutants`,
  # `run-windows`, `run-loom`, `run-chaos`) or manual-profile gated. This
  # workflow intentionally has no scheduled heavy runs; full mutation is too
  # expensive to let it starve PR feedback without an operator explicitly
  # asking for the `heavy` proof profile.
  rust-changed:
    name: Detect Rust-relevant changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.detect.outputs.rust }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base" HEAD | grep -qE '^(bpk-lib/|\.devcontainer/|\.github/workflows/ci\.yml|bpk-lib/\.cargo/)'; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi

  ts-host-changed:
    name: Detect TS/host-profile changes
    runs-on: ubuntu-latest
    outputs:
      touched: ${{ steps.detect.outputs.touched }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base" HEAD | grep -qE '^(bpk-ts/|bpk-lib/crates/hbat/|bpk-lib/crates/netbat/|bpk-lib/crates/syncbat/|bpk-lib/tools/xtask/src/commands/(export_ts_manifest|host_dev)\.rs|bpk-lib/tools/xtask/src/(main|commands)\.rs)'; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
          fi

  ci-fast-linux:
    name: CI fast (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-fast
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Fast PR signal
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask ci-fast'

  verify-linux:
    name: Verify (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'loom' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'run-heavy-ci') ||
         contains(github.event.pull_request.labels.*.name, 'run-loom')))
    needs: [ci-fast-linux]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: verify
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Canonical preflight proof bundle
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask preflight'

  ci-windows:
    name: CI Windows surface (native)
    runs-on: windows-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'windows' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'run-heavy-ci') ||
         contains(github.event.pull_request.labels.*.name, 'run-windows')))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.92.0
        with:
          toolchain: 1.92.0
          components: clippy,rustfmt
      - uses: taiki-e/install-action@f48d2f8ba2b452934c948b7be1a768079c3632ff # v2
        with:
          tool: cargo-nextest@0.9.132
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-windows
          workspaces: bpk-lib
      - name: Native Windows surface lane
        working-directory: bpk-lib
        run: cargo xtask ci-windows-surface

  feature-isolation:
    runs-on: ubuntu-latest
    needs: [ci-fast-linux, verify-linux, rust-changed]
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      ((github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'heavy')) ||
       (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-heavy-ci')))
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "--features dangerous-test-hooks"
          - "--no-default-features"
          - "--no-default-features --features dangerous-test-hooks"
          - "--all-features"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Feature-isolation test matrix
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh "cargo test ${{ matrix.features }}"

  smoke-consumers:
    name: Smoke (quickstart, packaged consumer, template)
    runs-on: ubuntu-latest
    needs: [verify-linux]
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-heavy-ci'))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Run onboarding smoke checks
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: |
          bash ./scripts/run-in-devcontainer.sh '
            cargo xtask quickstart &&
            cargo xtask consumer-smoke &&
            cargo xtask templates
          '

  ts-parity:
    # BatPAK TypeScript SDK Phase 0 wire-parity gate.
    #
    # Delegates to the canonical host proof command so bpk-ts, hbat, netbat,
    # syncbat, and manifest/codegen changes cannot pass default PR CI without
    # the same manifest -> TS -> hbat live roundtrip proof used locally.
    name: TS/host profile proof
    runs-on: ubuntu-latest
    needs: [ci-fast-linux, ts-host-changed]
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        (needs.ts-host-changed.outputs.touched == 'true' ||
         contains(github.event.pull_request.labels.*.name, 'run-heavy-ci')))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.92.0
        with:
          toolchain: 1.92.0
          components: clippy,rustfmt
      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: bpk-ts/pnpm-lock.yaml
      - name: Host profile proof
        working-directory: bpk-lib
        run: cargo xtask host-dev
      - name: Upload generated artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ts-parity-generated-debug
          path: |
            bpk-ts/packages/generated/
            bpk-ts/batpak.manifest.json
          if-no-files-found: warn
          retention-days: 7

  mutants-smoke:
    name: Mutation smoke (${{ matrix.seam }})
    runs-on: ubuntu-latest
    if: >-
      ((github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'mutants' ||
         github.event.inputs.proof == 'heavy')) ||
       (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'run-heavy-ci') ||
         contains(github.event.pull_request.labels.*.name, 'run-mutants')))) &&
      needs.rust-changed.outputs.rust == 'true'
    needs: [ci-fast-linux, rust-changed]
    strategy:
      fail-fast: false
      matrix:
        seam:
          - writer-commit
          - cursor-delivery
          - projection-flow
          - segment-scan
          - hash-chain-replay
          - frontier-wait-durable
          - frontier-append-gate
          - event-payload-registry-validator
          - platform-backend
          - testing-ledger-structural-lint
          - syncbat-runtime-dispatch
          - syncbat-register-catalog
          - netbat-boundary-protocol
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: mutants-smoke-${{ matrix.seam }}
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Mutation smoke (critical seam shard)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants smoke --seam ${{ matrix.seam }}'

  mutants-smoke-repo-wide:
    name: Mutation smoke (repo-wide ratchet)
    runs-on: ubuntu-latest
    if: >-
      ((github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'mutants' ||
         github.event.inputs.proof == 'heavy')) ||
       (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'run-heavy-ci') ||
         contains(github.event.pull_request.labels.*.name, 'run-mutants')))) &&
      needs.rust-changed.outputs.rust == 'true'
    needs: [ci-fast-linux, rust-changed]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: mutants-smoke-repo-wide
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Mutation smoke (repo-wide shard 1/48)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants smoke --repo-wide-only'

  loom-schedule-proof:
    name: Loom schedule proof
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'loom' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'run-heavy-ci') ||
         contains(github.event.pull_request.labels.*.name, 'run-loom')))
    needs: [ci-fast-linux, verify-linux]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Bounded loom schedule proofs
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask loom'

  mutants-full:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.proof == 'heavy'
    strategy:
      fail-fast: false
      matrix:
        surface:
          - all-features
          - no-default-features
        shard:
          - 1/12
          - 2/12
          - 3/12
          - 4/12
          - 5/12
          - 6/12
          - 7/12
          - 8/12
          - 9/12
          - 10/12
          - 11/12
          - 12/12
    name: Mutation full (${{ matrix.surface }} shard ${{ matrix.shard }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: mutants-full-${{ matrix.surface }}-${{ matrix.shard }}
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Full mutation shard
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants full --surface ${{ matrix.surface }} --shard ${{ matrix.shard }}'

  chaos-proof:
    name: Chaos (dm-flakey)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'chaos' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-chaos'))
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.92.0
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - name: Install block-device chaos tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dmsetup e2fsprogs util-linux
      - name: dm-flakey harness
        working-directory: bpk-lib
        env:
          BATPAK_RUN_CHAOS: "1"
        run: cargo test --features dangerous-test-hooks --test chaos -- --test-threads=1

  docs:
    runs-on: ubuntu-latest
    needs: [verify-linux]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Build root docs site + rustdoc
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask docs'
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: bpk-lib/target/site
      - id: deploy
        # `continue-on-error: true` because the deploy step will hard-fail
        # with `404 Not Found` until GitHub Pages is enabled in repository
        # Settings → Pages (deployment source: "GitHub Actions"). The build
        # and upload steps above are the meaningful gates — they catch
        # rustdoc and root-doc site breakage. The deploy itself is the LAST mile and
        # should not block CI on a one-time admin setup that the codebase
        # cannot fix from inside Rust source. Once Pages is enabled, this
        # step succeeds silently and `continue-on-error` becomes a no-op.
        # See: https://github.com/TheFreeBatteryFactory/batpak/settings/pages
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
