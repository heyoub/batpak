name: Integrity CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    # Default manual runs are intentionally cheap. Choose an explicit proof
    # profile when you want to spend hosted CI minutes on deeper evidence.
    inputs:
      proof:
        description: "Proof profile to run"
        required: true
        default: fast
        type: choice
        options:
          - fast
          - verify
          - windows
          - mutants
          - loom
          - chaos
          - heavy
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # tests/common/proptest.rs treats this as a floor, not an exact override:
  # small fast tests can be lifted upward in CI without silently capping
  # deeper fuzz/property surfaces that already ask for more.
  PROPTEST_CASES: 256
  # tests/chaos_testing.rs now defaults to 500 in source. CI sets the same
  # value explicitly so the canonical container lane, local preflight, and
  # manual deep overrides all agree on the intended baseline.
  CHAOS_ITERATIONS: 500

jobs:
  # Cost posture: pull requests run the fast devcontainer lane by default.
  # Expensive proof jobs are label-gated (`run-heavy-ci`, `run-mutants`,
  # `run-windows`, `run-loom`, `run-chaos`) or manual-profile gated. This
  # workflow intentionally has no scheduled heavy runs; full mutation is too
  # expensive to let it starve PR feedback without an operator explicitly
  # asking for the `heavy` proof profile.
  rust-changed:
    name: Detect Rust-relevant changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.detect.outputs.rust }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base" HEAD | grep -qE '^(bpk-lib/|\.devcontainer/|\.github/workflows/ci\.yml|bpk-lib/\.cargo/)'; then
            echo "rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust=false" >> "$GITHUB_OUTPUT"
          fi

  ts-host-changed:
    name: Detect TS/host-profile changes
    runs-on: ubuntu-latest
    outputs:
      touched: ${{ steps.detect.outputs.touched }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base" HEAD | grep -qE '^(bpk-ts/|bpk-lib/crates/refbat/|bpk-lib/crates/netbat/|bpk-lib/crates/syncbat/|bpk-lib/tools/xtask/src/commands/(export_ts_manifest|host_dev)\.rs|bpk-lib/tools/xtask/src/(main|commands)\.rs)'; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
          fi

  ci-fast-linux:
    name: CI fast (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-fast
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Fast PR signal
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask ci-fast'

  meta-gate:
    # Agent-safety meta-gate (P1-4, "raccoon with commit access"): blocks a diff
    # that WEAKENS the assurance machinery (lowers a threshold, raises a cap, adds
    # a waiver entry, re-buries a gate, deletes a red fixture, downgrades an
    # assurance level) unless a human applied the `gauntlet-weaken-approved` label
    # AND a `GAUNTLET-WEAKEN-OK:` commit trailer is present (plus a second-author
    # trailer for L4 blast radius). Needs full history (`fetch-depth: 0`) to
    # resolve the merge-base and read commit trailers. The classifier is pure and
    # unit/mutation-tested in tools/integrity/src/meta_gate.rs.
    name: Agent-safety meta-gate
    runs-on: ubuntu-latest
    needs: [rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: meta-gate
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Classify diff for unapproved weakenings
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
          # The meta-gate READS these; CI cannot self-apply the approval label.
          GAUNTLET_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          GAUNTLET_PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          GAUNTLET_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask meta-gate --base "${GAUNTLET_PR_BASE_SHA:-origin/main}"'

  coverage-baseline:
    # Always-on, NON-BLOCKING coverage observation for every Rust-touching PR.
    #
    # The hard threshold-80 coverage gate now lives on the DEFAULT PR path
    # inside `cargo xtask ci-fast` (ci-fast-linux job) — see commands/ci.rs,
    # which calls `coverage::cover` with the shared COVERAGE_FLOOR_PCT. This
    # job is intentionally advisory: it runs `cargo xtask cover` WITHOUT `--ci`,
    # so it only reports + uploads artifacts — it never gates a merge.
    # `continue-on-error: true` guarantees a cover-internal hiccup at the
    # baseline stage cannot block a PR. Ratcheting the default-PR floor upward
    # is a deferred follow-up; data must precede the ratchet.
    name: Coverage baseline (advisory)
    runs-on: ubuntu-latest
    needs: [ci-fast-linux, rust-changed]
    if: needs.rust-changed.outputs.rust == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: coverage-baseline
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Coverage baseline (report-only)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask cover'
      - name: Upload coverage baseline artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-baseline
          path: bpk-lib/target/xtask-cover/last-run/
          if-no-files-found: warn
          retention-days: 14

  verify-linux:
    name: Verify (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'loom' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'run-heavy-ci') ||
         contains(github.event.pull_request.labels.*.name, 'run-loom')))
    needs: [ci-fast-linux]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: verify
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Canonical preflight proof bundle
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask preflight'

  ci-windows:
    name: CI Windows surface (native)
    runs-on: windows-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'windows' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'run-heavy-ci') ||
         contains(github.event.pull_request.labels.*.name, 'run-windows')))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.92.0
        with:
          toolchain: 1.92.0
          components: clippy,rustfmt
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: cargo-nextest@0.9.132
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: ci-windows
          workspaces: bpk-lib
      - name: Native Windows surface lane
        working-directory: bpk-lib
        run: cargo xtask ci-windows-surface

  feature-isolation:
    runs-on: ubuntu-latest
    needs: [ci-fast-linux, verify-linux, rust-changed]
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      ((github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'heavy')) ||
       (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-heavy-ci')))
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "--features dangerous-test-hooks"
          - "--no-default-features"
          - "--no-default-features --features dangerous-test-hooks"
          - "--all-features"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Feature-isolation test matrix
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh "cargo test ${{ matrix.features }}"

  smoke-consumers:
    name: Smoke (quickstart, packaged consumer, template)
    runs-on: ubuntu-latest
    needs: [verify-linux]
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-heavy-ci'))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Run onboarding smoke checks
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: |
          bash ./scripts/run-in-devcontainer.sh '
            cargo xtask quickstart &&
            cargo xtask consumer-smoke &&
            cargo xtask templates
          '

      # P1-3b anti-vacuous gate: the packaged-consumer build runs batpak's
      # build.rs with the repo invariant surface ABSENT. The three surface-
      # dependent build-time lints must then record SKIPPED_PACKAGED receipts,
      # NOT a (vacuous) PASS. This distinguishes "ran and passed" from "did not
      # run". consumer-smoke builds into bpk-lib/target/consumer-smoke-build, so
      # build.rs writes receipts to
      # bpk-lib/target/consumer-smoke-build/debug/gauntlet-receipts/<slug>.json.
      - name: Assert packaged build-time lints SKIPPED (not vacuously PASSED)
        run: |
          set -euo pipefail
          dir="bpk-lib/target/consumer-smoke-build/debug/gauntlet-receipts"
          fail=0
          for slug in no-dead-code-silencers allow-justifications pub-items-have-tests; do
            f="$dir/$slug.json"
            if [ ! -f "$f" ]; then
              echo "::error::missing packaged receipt $f — the packaged build-time lint did not record its skip (silent vacuous pass)"
              fail=1
              continue
            fi
            verdict=$(jq -r '.verdict' "$f")
            echo "$slug -> $verdict"
            if [ "$verdict" != "SKIPPED_PACKAGED" ]; then
              echo "::error::packaged receipt $f has verdict '$verdict'; expected SKIPPED_PACKAGED. A PASS here would be vacuous (the lint cannot truly run without the repo invariant surface)."
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "All three build-time lints recorded explicit SKIPPED_PACKAGED receipts."

  ts-parity:
    # BatPAK TypeScript SDK Phase 0 wire-parity gate.
    #
    # Delegates to the canonical host proof command so bpk-ts, refbat, netbat,
    # syncbat, and manifest/codegen changes cannot pass default PR CI without
    # the same manifest -> TS -> refbat live roundtrip proof used locally.
    name: TS/host profile proof
    runs-on: ubuntu-latest
    needs: [ci-fast-linux, ts-host-changed]
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        (needs.ts-host-changed.outputs.touched == 'true' ||
         contains(github.event.pull_request.labels.*.name, 'run-heavy-ci')))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.92.0
        with:
          toolchain: 1.92.0
          components: clippy,rustfmt
      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: bpk-ts/pnpm-lock.yaml
      - name: Host profile proof
        working-directory: bpk-lib
        run: cargo xtask host-dev
      - name: Upload generated artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ts-parity-generated-debug
          path: |
            bpk-ts/packages/generated/
            bpk-ts/batpak.manifest.json
          if-no-files-found: warn
          retention-days: 7

  mutants-smoke:
    name: Mutation smoke (${{ matrix.seam }})
    runs-on: ubuntu-latest
    # Default-on for every Rust-touching PR: the smoke lanes are `--in-diff`,
    # so they only mutate lines the PR changed (cheap). This closes the gap
    # where a PR could merge with new critical seams never mutation-tested.
    # Repo-wide and full mutation lanes stay label/manual-gated below.
    if: >-
      (github.event_name == 'pull_request' ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'mutants' ||
         github.event.inputs.proof == 'heavy'))) &&
      needs.rust-changed.outputs.rust == 'true'
    needs: [ci-fast-linux, rust-changed]
    strategy:
      fail-fast: false
      matrix:
        seam:
          - writer-commit
          - cursor-delivery
          - projection-flow
          - projection-fusion
          - segment-scan
          - hash-chain-replay
          - frontier-wait-durable
          - frontier-append-gate
          - event-payload-registry-validator
          - platform-backend
          - testing-ledger-structural-lint
          - integrity-graders
          - syncbat-runtime-dispatch
          - syncbat-register-catalog
          - netbat-boundary-protocol
          - fork-isolation
          - import-reapply
          - lane-branch
          - lane-frontier
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          # Diff-scoped mutation needs the PR base reachable so we can write the
          # base..head patch that cargo-mutants consumes via --in-diff.
          fetch-depth: 0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: mutants-smoke-${{ matrix.seam }}
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Resolve PR diff for diff-scoped mutation
        # Only pull requests carry a base sha; on workflow_dispatch (manual
        # mutants/heavy runs) `github.event.pull_request.base.sha` is empty and
        # `git diff "" HEAD` exits 128 before xtask can run. Skip this step for
        # manual runs and leave BATPAK_MUTANTS_DIFF unset so resolve_smoke_diff's
        # local merge-base fallback derives the scope instead.
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          # Write the base..head patch onto the mounted workspace so the path
          # resolves identically inside the devcontainer. `-C bpk-lib --relative`
          # emits `crates/...` paths relative to bpk-lib/ (where cargo-mutants
          # runs); without it the diff carries `bpk-lib/...` prefixes that
          # cargo-mutants' --in-diff matcher silently drops.
          mkdir -p bpk-lib/target
          git -C bpk-lib diff --relative "$base" HEAD > bpk-lib/target/smoke-diff.patch
          # Plumb the patch path only when we actually wrote one. The smoke step
          # hard-fails if BATPAK_MUTANTS_DIFF points at a missing file, so manual
          # runs must leave it unset to take the local fallback path.
          echo "BATPAK_MUTANTS_DIFF=/workspace/batpak/bpk-lib/target/smoke-diff.patch" >> "$GITHUB_ENV"
          echo "wrote $(wc -l < bpk-lib/target/smoke-diff.patch) lines of diff for base $base"
      - name: Mutation smoke (critical seam, diff-scoped)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants smoke --seam ${{ matrix.seam }}'

  mutants-smoke-repo-wide:
    name: Mutation smoke (repo-wide ratchet)
    runs-on: ubuntu-latest
    # Default-on, EVERY Rust-touching PR (gated only by the rust-changed
    # detector — no label required), mirroring the always-on fuzz-smoke lane.
    # This is bounded because it runs only the single repo-wide shard 0/48
    # (REPO_WIDE_SMOKE_SHARD, lanes.rs). The heavy full 0/12..11/12 matrix
    # (mutants-full) stays manual/label-only.
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      ((github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'mutants' ||
         github.event.inputs.proof == 'heavy')) ||
       github.event_name == 'pull_request')
    needs: [ci-fast-linux, rust-changed]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: mutants-smoke-repo-wide
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Mutation smoke (repo-wide shard 0/48)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants smoke --repo-wide-only'

  loom-schedule-proof:
    name: Loom schedule proof
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'loom' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' &&
        (contains(github.event.pull_request.labels.*.name, 'run-heavy-ci') ||
         contains(github.event.pull_request.labels.*.name, 'run-loom')))
    needs: [ci-fast-linux, verify-linux]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Bounded loom schedule proofs
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask loom'

  mutants-full:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.proof == 'heavy'
    strategy:
      fail-fast: false
      matrix:
        surface:
          - all-features
          - no-default-features
        shard:
          - 0/12
          - 1/12
          - 2/12
          - 3/12
          - 4/12
          - 5/12
          - 6/12
          - 7/12
          - 8/12
          - 9/12
          - 10/12
          - 11/12
    name: Mutation full (${{ matrix.surface }} shard ${{ matrix.shard }})
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: mutants-full-${{ matrix.surface }}-${{ matrix.shard }}
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Full mutation shard
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask mutants full --surface ${{ matrix.surface }} --shard ${{ matrix.shard }}'

  chaos-proof:
    name: Chaos (dm-flakey)
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'chaos' ||
         github.event.inputs.proof == 'heavy')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-chaos'))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.92.0
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - name: Install block-device chaos tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dmsetup e2fsprogs util-linux
      - name: dm-flakey harness
        working-directory: bpk-lib
        env:
          BATPAK_RUN_CHAOS: "1"
        run: cargo test --features dangerous-test-hooks --test chaos -- --test-threads=1

  fuzz-replay:
    # GAUNT-FUZZ-1 — the PR-BLOCKING fuzz-replay gate (the gateable, deterministic
    # half). NOT cargo-fuzz: a normal `#[test]` on the standard devcontainer
    # toolchain that re-runs every committed corpus + regression input through the
    # real `batpak::__fuzz::*` decode entry points and asserts none panics. Fast
    # (<1s/file), hardware-independent, no nightly/sanitizer needed — so it rides
    # the always-on PR lane (gated only by the rust-changed detector), unlike the
    # nightly cargo-fuzz `fuzz-smoke` below. The `fuzz_replay_covers_every_target`
    # meta-test inside the same binary reds if any declared fuzz `[[bin]]` loses its
    # regression fixture or dispatcher wiring, so the gate can't be hollowed out.
    name: Fuzz replay (committed corpus)
    runs-on: ubuntu-latest
    needs: [ci-fast-linux, rust-changed]
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      (github.event_name == 'pull_request' ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'chaos' ||
         github.event.inputs.proof == 'heavy')))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: fuzz-replay
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Replay committed fuzz corpus + regressions (no panic)
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: >-
          bash ./scripts/run-in-devcontainer.sh
          'cargo test -p batpak --test fuzz_replay --features dangerous-test-hooks'

  gauntlet-red-fixtures-bite:
    # GAUNTLET-TQL — "prove the gates bite". The gate registry records each blocking
    # gate's anti-vacuous red fixture; for ProductionFlip fixtures (S2/S3 durability
    # sentinels + the perf-alloc budget) anti-vacuity means the fixture FAILS under
    # `--cfg gauntlet_red_fixture` (its expectation flips to the illegal/old
    # behavior). This lane rebuilds those fixtures under the cfg and asserts each
    # test actually reds — a fixture that PASSES under the cfg has no real red half,
    # so its gate's blocking authority is laundered. The fixture list comes from the
    # registry (`batpak-integrity production-flip-fixtures`), so this lane and the
    # registry can never drift. Runs every PR (gated only by rust-changed), like the
    # fuzz-replay gate above.
    name: Gauntlet — prove the gates bite
    runs-on: ubuntu-latest
    needs: [ci-fast-linux, rust-changed]
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      (github.event_name == 'pull_request' ||
       (github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'chaos' ||
         github.event.inputs.proof == 'heavy')))
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: gauntlet-bite
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Prove every ProductionFlip red fixture reds under the cfg
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: >-
          bash ./scripts/run-in-devcontainer.sh
          'cargo xtask prove-gates-bite'

  fuzz-smoke:
    # Gauntlet Phase 0B — SENTINEL S1: cargo-fuzz smoke on `frame_decode`.
    #
    # Always-on, EVERY-PR offensive breaker (gated only by the rust-changed
    # detector — no label required, mirroring how S2/S3 ride the always-on test
    # lane). Runs the libFuzzer target for a short fixed 60s budget against the
    # committed seed corpus + RED regression. Bounds memory with `-rss_limit_mb`
    # so a crafted huge length-prefix frame OOMing the box is a CRASH, not a
    # silent hang. cargo-fuzz needs the nightly toolchain (sancov + ASan +
    # rust-src for -Z build-std of the sanitizer runtime), so this job uses a
    # native nightly toolchain instead of the 1.92.0 devcontainer lane.
    name: Fuzz smoke (frame_decode)
    runs-on: ubuntu-latest
    needs: [ci-fast-linux, rust-changed]
    if: >-
      needs.rust-changed.outputs.rust == 'true' &&
      ((github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.proof == 'verify' ||
         github.event.inputs.proof == 'chaos' ||
         github.event.inputs.proof == 'heavy')) ||
       github.event_name == 'pull_request')
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      # Same pinned dtolnay/rust-toolchain commit as the other lanes; the
      # toolchain is selected by the `toolchain:` input, not the action tag.
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # v1 (nightly via input)
        with:
          toolchain: nightly
          components: rust-src
          # ASan/libFuzzer require a dynamically-linked (glibc) target: musl is
          # statically linked (+crt-static) and the sanitizer refuses to link
          # against it ("sanitizer is incompatible with statically linked
          # libc"). Pin gnu explicitly so the target std is present.
          targets: x86_64-unknown-linux-gnu
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2
        with:
          tool: cargo-fuzz@0.13.2
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: fuzz-smoke
          workspaces: bpk-lib/fuzz
      # cargo-fuzz defaults `--target` to the triple its own prebuilt binary was
      # compiled for (via the `current_platform` crate), which the taiki-e
      # install-action resolves to the statically-linked musl triple — fatal for
      # ASan. Pin the gnu target on BOTH build and run so the sanitizer links.
      # GAUNT-FUZZ-1: build EVERY declared fuzz target so a target that stops
      # compiling under the nightly + sanitizer toolchain fails the lane (the
      # devcontainer fuzz-replay lane only proves they build on the stable
      # toolchain). `cargo fuzz build` with no target name builds all `[[bin]]`s.
      - name: Build all fuzz targets
        working-directory: bpk-lib/fuzz
        run: cargo +nightly fuzz build --target x86_64-unknown-linux-gnu
      # Always-on PR smoke: a short frame_decode run for fast signal on the
      # store's hottest decode surface. The full per-target sweep below is the
      # deep (heavy/chaos dispatch) lane.
      - name: Fuzz smoke (frame_decode, 60s, RSS-bounded)
        working-directory: bpk-lib/fuzz
        # `corpus/frame_decode` seeds the run; libFuzzer also replays the RED
        # regression dir. -max_total_time caps the budget; -rss_limit_mb makes an
        # unbounded-allocation regression a hard crash.
        run: >-
          cargo +nightly fuzz run frame_decode --target x86_64-unknown-linux-gnu --
          -max_total_time=60
          -rss_limit_mb=2048
      # Deep sweep (scheduled/heavy): loop EVERY target for a longer budget,
      # seeded by its committed corpus and replaying its RED regressions. Only on
      # the heavy/chaos workflow_dispatch profiles so PR cost stays bounded.
      - name: Fuzz sweep (all targets, RSS-bounded)
        if: >-
          github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.proof == 'chaos' || github.event.inputs.proof == 'heavy')
        working-directory: bpk-lib/fuzz
        # -max_total_time is per target; keep the gnu-target pin for the
        # sanitizer link on every invocation.
        run: |
          for target in \
            frame_decode segment_header sidx_entry checkpoint_data \
            checkpoint_snapshot_v6 mmap_entry cache_meta projection_state \
            hidden_ranges mmap_index_load sidx_footer; do
            echo "::group::fuzz $target"
            cargo +nightly fuzz run "$target" --target x86_64-unknown-linux-gnu -- \
              -max_total_time=900 \
              -rss_limit_mb=2048
            echo "::endgroup::"
          done
      - name: Upload fuzz crash artifacts on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes
          path: bpk-lib/fuzz/artifacts/
          if-no-files-found: ignore
          retention-days: 14

  docs:
    runs-on: ubuntu-latest
    needs: [verify-linux]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - uses: ./.github/actions/setup-devcontainer
      - name: Build root docs site + rustdoc
        env:
          BATPAK_DEVCONTAINER_IMAGE: batpak-devcontainer:ci
          BATPAK_DEVCONTAINER_SKIP_BUILD: "1"
        run: bash ./scripts/run-in-devcontainer.sh 'cargo xtask docs'
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: bpk-lib/target/site
      - id: deploy
        # `continue-on-error: true` because the deploy step will hard-fail
        # with `404 Not Found` until GitHub Pages is enabled in repository
        # Settings → Pages (deployment source: "GitHub Actions"). The build
        # and upload steps above are the meaningful gates — they catch
        # rustdoc and root-doc site breakage. The deploy itself is the LAST mile and
        # should not block CI on a one-time admin setup that the codebase
        # cannot fix from inside Rust source. Once Pages is enabled, this
        # step succeeds silently and `continue-on-error` becomes a no-op.
        # See: https://github.com/TheFreeBatteryFactory/batpak/settings/pages
        continue-on-error: true
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
