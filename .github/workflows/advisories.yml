name: Advisory Ratchet

# Runs on-demand. Surfaces CVEs before release or when an operator wants a
# focused advisory sweep outside the per-PR `cargo deny check + audit` pass.
#
# Failure mode: writes and uploads an advisory report artifact, then fails the
# manual workflow. The CI loop is intentionally non-blocking on PRs — we can
# run this focused sweep before release without surprising normal merges.

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: advisory-ratchet
  cancel-in-progress: false

jobs:
  audit:
    name: cargo audit + cargo deny advisories
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: bpk-lib
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.92.0
        with:
          toolchain: 1.92.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: bpk-lib
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit@0.22.1
      - name: Install cargo-deny
        run: cargo install --locked cargo-deny@0.19.0
      - name: cargo audit
        id: audit
        run: |
          set +e
          cargo audit --deny warnings 2>&1 | tee ../advisory-audit.txt
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: cargo deny check advisories
        id: deny
        run: |
          set +e
          cargo deny check advisories 2>&1 | tee ../advisory-deny.txt
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Fail if any advisory tripped
        if: steps.audit.outputs.status != '0' || steps.deny.outputs.status != '0'
        env:
          AUDIT_STATUS: ${{ steps.audit.outputs.status }}
          DENY_STATUS: ${{ steps.deny.outputs.status }}
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          {
            echo "## Advisory ratchet — failure on $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "- \`cargo audit\` exit status: $AUDIT_STATUS"
            echo "- \`cargo deny check advisories\` exit status: $DENY_STATUS"
            echo
            echo "### cargo audit output"
            echo
            echo '```text'
            cat advisory-audit.txt
            echo '```'
            echo
            echo "### cargo deny check advisories output"
            echo
            echo '```text'
            cat advisory-deny.txt
            echo '```'
          } > advisory-report.md

          # Attach as an artifact for direct download.
          mkdir -p .ratchet-artifacts
          cp advisory-report.md .ratchet-artifacts/
          echo "ADVISORY_REPORT=$(pwd)/advisory-report.md" >> "$GITHUB_ENV"
          echo "::error::Advisory ratchet failed. See report below."
          cat advisory-report.md
          exit 1
      - name: Upload advisory report artifact
        if: always() && (steps.audit.outputs.status != '0' || steps.deny.outputs.status != '0')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: advisory-ratchet-report
          path: advisory-report.md
          if-no-files-found: ignore
          retention-days: 30
