name: Bug report
description: Report a reproducible defect in the crate or repo workflow
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include code, commands, and data if possible.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: input
    id: rust-version
    attributes:
      label: Rust version
      description: Paste `rustc -V`.
      placeholder: rustc 1.92.0 (...)
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Feature flags, storage/runtime details, and `cargo xtask doctor` output if relevant.
