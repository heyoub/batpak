name: Setup Devcontainer
description: Build and load the canonical batpak devcontainer image with GitHub Actions layer caching.

runs:
  using: composite
  steps:
    - name: Install host Rust toolchain for xtask-driven wrapper calls
      uses: dtolnay/rust-toolchain@stable

    - name: Capture runner UID/GID for workspace mounts
      id: host-ids
      shell: bash
      run: |
        echo "uid=$(id -u)" >> "$GITHUB_OUTPUT"
        echo "gid=$(id -g)" >> "$GITHUB_OUTPUT"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build batpak devcontainer image
      uses: docker/build-push-action@v7
      with:
        context: ${{ github.workspace }}
        file: ${{ github.workspace }}/.devcontainer/Dockerfile
        tags: batpak-devcontainer:ci
        load: true
        build-args: |
          USER_UID=${{ steps.host-ids.outputs.uid }}
          USER_GID=${{ steps.host-ids.outputs.gid }}
        cache-from: type=gha,scope=batpak-devcontainer
        cache-to: type=gha,mode=max,scope=batpak-devcontainer
