name: Setup Devcontainer
description: Build and load the canonical batpak devcontainer image with GitHub Actions layer caching.

runs:
  using: composite
  steps:
    - name: Install host Rust toolchain for xtask-driven wrapper calls
      uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # 1.92.0
      with:
        toolchain: 1.92.0

    - name: Capture runner UID/GID for workspace mounts
      id: host-ids
      shell: bash
      run: |
        echo "uid=$(id -u)" >> "$GITHUB_OUTPUT"
        echo "gid=$(id -g)" >> "$GITHUB_OUTPUT"

    - name: Reclaim runner disk before devcontainer build
      shell: bash
      run: |
        set -euo pipefail
        echo "disk before cleanup:"
        df -h /
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
        docker system prune -af || true
        echo "disk after cleanup:"
        df -h /

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

    - name: Build batpak devcontainer image
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: ${{ github.workspace }}
        file: ${{ github.workspace }}/.devcontainer/Dockerfile
        tags: batpak-devcontainer:ci
        load: true
        build-args: |
          USER_UID=${{ steps.host-ids.outputs.uid }}
          USER_GID=${{ steps.host-ids.outputs.gid }}
        cache-from: type=gha,scope=batpak-devcontainer
        cache-to: type=gha,mode=max,scope=batpak-devcontainer

    - name: Reclaim build cache after devcontainer load
      shell: bash
      run: |
        set -euo pipefail
        docker builder prune -af || true
        docker system df
        df -h /
