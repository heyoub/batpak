version: 2
updates:
  - package-ecosystem: cargo
    directory: /bpk-lib
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
  - package-ecosystem: npm
    directory: /bpk-ts
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
