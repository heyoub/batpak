# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/rule.json

id: store-direct-named-tempfile
message: Direct NamedTempFile::new_in contact found. Production store paths should route through store::platform::fs::named_temp_in unless this is platform code, a fixture, or test-only setup.
severity: info
language: Rust
rule:
  pattern: NamedTempFile::new_in($$$ARGS)
note: >
  Audit-only caliper for platform-boundary shrink work. Structural owns the
  enforceable allowlist; this rule is for discovery and review.
