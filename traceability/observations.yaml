- id: OBS-CADENCE-GT-1-VISIBLE-EXCEEDS-DURABLE
  status: current-fact
  statement: >
    On single append with sync.every_n_events > 1, current_visible_hlc can
    exceed durable_hlc until the next explicit or cadence-driven sync. Batch
    append and cadence=1 do not exhibit this gap at the observation points
    defended by the durable frontier semantics harness. A later durability-gated
    read contract may tighten which frontier ordinary reads are allowed to
    observe.
  evidence:
    - "tests/durable_frontier_semantics.rs :: single_append_cadence_gt_1_visible_exceeds_durable_frontier"
    - "tests/durable_frontier_semantics.rs :: frontier_visible_minus_durable_seq_is_positive_under_cadence_gt_1"
    - "tests/durable_frontier_semantics.rs :: single_append_published_fault_fires_after_visibility_before_receipt"
  replaces_when: Phase 1/2 durable-read contract lands
  artifacts:
    - ART-FRONTIER-WATERMARK-STATE
    - ART-FRONTIER-SEMANTICS-TESTS
- id: OBS-DURABLE-HLC-INCLUDES-OS-PRESERVED-DATA
  status: current-fact
  statement: >
    On recovery, durable_hlc is derived from max_recovered_hlc and therefore
    classifies any physically-on-disk event as durable, including events whose
    fsync was never deliberately called by batpak but which the OS preserved via
    journal commit, periodic flush, or unmount-time sync. The substrate has no
    fsync-history marker that would distinguish 'batpak deliberately fsynced'
    from 'OS preserved.' This is consistent with Meaning-2 durable_hlc
    semantics; under Meaning-1 semantics it would constitute a substrate gap.
  evidence:
    - "tests/chaos/scenarios/single_append_written.rs :: durable_frontier_covers_recovered_state_after_device_failure_cadence_1000"
  replaces_when: >
    Substrate adopts a fsync-history watermark marker (no current plan;
    Meaning-2 is the contract).
  artifacts:
    - ART-CHAOS-HARNESS
    - ART-FRONTIER-WATERMARK-STATE
