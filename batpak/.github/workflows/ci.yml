name: Integrity CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

env:
  CARGO_TERM_COLOR: always
  PROPTEST_CASES: 256

jobs:
  integrity-linux-container:
    name: Integrity (ubuntu-devcontainer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Canonical container integrity gates
        run: |
          bash ./scripts/run-in-devcontainer.sh '
            cargo run --manifest-path tools/integrity/Cargo.toml -- doctor --strict &&
            cargo run --manifest-path tools/integrity/Cargo.toml -- traceability-check &&
            cargo run --manifest-path tools/integrity/Cargo.toml -- structural-check &&
            cargo fmt --check &&
            cargo clippy --all-features --all-targets -- -D warnings &&
            cargo deny check &&
            cargo check --all-features &&
            cargo check --no-default-features &&
            cargo nextest run --profile ci --all-features &&
            cargo test --doc --all-features &&
            cargo bench --no-run --all-features
          '

  integrity-windows-native:
    name: Integrity (windows-native)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: batpak
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt,llvm-tools-preview
      - uses: taiki-e/install-action@nextest
      - uses: taiki-e/install-action@cargo-deny
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-mutants
      - uses: Swatinem/rust-cache@v2
      - name: Doctor
        run: cargo run --manifest-path tools/integrity/Cargo.toml -- doctor --strict
      - name: Traceability
        run: cargo run --manifest-path tools/integrity/Cargo.toml -- traceability-check
      - name: Structural
        run: cargo run --manifest-path tools/integrity/Cargo.toml -- structural-check
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-features --all-targets -- -D warnings
      - name: Deny
        run: cargo deny check
      - name: Check all features
        run: cargo check --all-features
      - name: Check no default features
        run: cargo check --no-default-features
      - name: Tests
        run: cargo nextest run --profile ci --all-features
      - name: Doc tests
        run: cargo test --doc --all-features
      - name: Bench compile
        run: cargo bench --no-run --all-features

  feature-isolation:
    runs-on: ubuntu-latest
    needs: [integrity-linux-container, integrity-windows-native]
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "--features blake3"
          - "--features redb"
          - "--features lmdb"
          - "--features test-support"
    steps:
      - uses: actions/checkout@v4
      - name: Feature-isolation test matrix
        run: bash ./scripts/run-in-devcontainer.sh "cargo test ${{ matrix.features }}"

  coverage:
    runs-on: ubuntu-latest
    needs: [integrity-linux-container, integrity-windows-native]
    steps:
      - uses: actions/checkout@v4
      - name: Coverage threshold check
        run: |
          bash ./scripts/run-in-devcontainer.sh '
            SUMMARY=$(cargo llvm-cov test --all-features --json 2>/dev/null | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            totals = data[\"data\"][0][\"totals\"]
            lines = totals[\"lines\"]
            pct = lines[\"covered\"] * 100 // lines[\"count\"] if lines[\"count\"] > 0 else 0
            print(f\"{pct}\")
            ")
            echo "Line coverage: ${SUMMARY}%"
            if [ "${SUMMARY}" -lt 80 ]; then
              echo "FAIL: coverage ${SUMMARY}% < 80%"
              exit 1
            fi
          '

  mutants:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Mutation smoke (all features)
        run: bash ./scripts/run-in-devcontainer.sh 'cargo mutants --file "src/store/*.rs" --file src/wire.rs --file "src/guard/*.rs" --file "src/pipeline/*.rs" --exclude src/store/ancestors_clock.rs --shard 1/12 --all-features --test-tool cargo'
      - name: Mutation smoke (no default features)
        run: bash ./scripts/run-in-devcontainer.sh 'cargo mutants --file "src/store/*.rs" --exclude src/store/ancestors_hash.rs --shard 1/12 --no-default-features --test-tool cargo'

  mutants-full:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        surface:
          - name: all-features
            command: >-
              cargo mutants --file "src/store/*.rs" --file src/wire.rs --file "src/guard/*.rs" --file "src/pipeline/*.rs" --exclude src/store/ancestors_clock.rs --all-features --test-tool cargo
          - name: no-default-features
            command: >-
              cargo mutants --file "src/store/*.rs" --exclude src/store/ancestors_hash.rs --no-default-features --test-tool cargo
        shard:
          - 1/12
          - 2/12
          - 3/12
          - 4/12
          - 5/12
          - 6/12
          - 7/12
          - 8/12
          - 9/12
          - 10/12
          - 11/12
          - 12/12
    name: Mutation full (${{ matrix.surface.name }} shard ${{ matrix.shard }})
    steps:
      - uses: actions/checkout@v4
      - name: Full mutation shard
        run: bash ./scripts/run-in-devcontainer.sh '${{ matrix.surface.command }} --shard ${{ matrix.shard }}'

  docs:
    runs-on: ubuntu-latest
    needs: [integrity-linux-container, integrity-windows-native]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Build rustdoc in canonical container
        run: bash ./scripts/run-in-devcontainer.sh 'RUSTDOCFLAGS="--cfg docsrs -D warnings" cargo doc --all-features --no-deps'
      - name: Add redirect index
        run: echo '<meta http-equiv="refresh" content="0;url=batpak/index.html">' > batpak/target/doc/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: batpak/target/doc
      - id: deploy
        uses: actions/deploy-pages@v4
