[profile.default]
retries = 0
slow-timeout = { period = "30s", terminate-after = 2 }
fail-fast = true

[profile.ci]
retries = 2
fail-fast = false
test-threads = "num-cpus"
slow-timeout = { period = "60s", terminate-after = 3 }

# Property tests that open multiple stores with different view configs
# can exceed 60s on Windows CI due to NTFS per-file-operation latency.
[[profile.ci.overrides]]
filter = "test(all_view_topologies) | test(reopened_view_topologies) | test(reopen_paths_match)"
slow-timeout = { period = "120s", terminate-after = 2 }

[profile.default.junit]
path = "target/nextest/default/junit.xml"
